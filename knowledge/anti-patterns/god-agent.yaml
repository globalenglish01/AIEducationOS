exam_points:
  - "God Agent：所有工具/权限集中一个 Agent，职责不清、难调试、安全风险高"
  - "检测信号：工具 > 10 个、Prompt > 2000 tokens、同时有读写删权限"
  - "解决：Supervisor-Worker 专业化分工 + 最小权限原则"
  - "高权限操作（删除/支付）单独 Agent + Human-in-the-Loop"

one_liner: "God Agent = 把所有功能塞一个 Agent 的反模式：工具太多 LLM 选错，权限太高注入即灾难，调试无从下手——用 Supervisor-Worker 专业化分工解决。"
difficulty: beginner

common_misconceptions:
  - misconception: "工具越多，Agent 越强大"
    reality: "工具越多，LLM 选择错误的概率越高，性能反而下降；专业化 Agent 更高效"
  - misconception: "一个 Agent 处理所有请求，系统更简单"
    reality: "初期看似简单，随业务增长快速变成无法维护的'意大利面代码'"
