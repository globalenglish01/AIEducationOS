interview_points:
  - "什么是 IDOR？在 AI 系统中为什么比传统 Web 更难防范？"
  - "如何在 Agent 工具中防止 IDOR？（工厂函数模式）"
  - "为什么无权访问时应返回 404 而不是 403？"
  - "如何测试 AI 系统中的 IDOR 漏洞？（L3+ 安全考察）"

exam_points:
  - "IDOR = 按用户提供的 ID 查询，不验证所有权；防御：WHERE id=? AND user_id=?"
  - "Agent 工具防 IDOR：工厂函数将 user_id 闭包进工具，不接受 LLM 传入"
  - "404 统一响应：不区分'不存在'和'无权限'，防止攻击者枚举 ID"
  - "user_id 从 JWT 取，永远不从请求体取"

one_liner: "IDOR = 拿别人 ID 访问别人数据的漏洞；防御三件套：数据库 WHERE 加 user_id、工具用工厂函数封装 user_id、无权访问统一返回 404。"
difficulty: intermediate
