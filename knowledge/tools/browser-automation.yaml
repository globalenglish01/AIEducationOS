summary: "让 AI Agent 控制真实浏览器执行网页操作（点击/填表/截图），将浏览器变为 Agent 的超级工具，实现 RPA+AI 融合。"

definition: |
  Browser Automation 是让 AI Agent 控制真实浏览器的工具集：
  - Playwright：微软开发的跨浏览器自动化库，支持 Chromium/Firefox/Safari
  - Browser-Use：专为 AI Agent 设计的 Playwright 封装，提供 LLM 友好的操作接口
  - Computer Use（Anthropic）：让 Claude 直接操作整个桌面（不限于浏览器）

  核心能力：
  - 导航：打开 URL、前进/后退
  - 操作：点击元素、填写表单、下拉选择、文件上传
  - 提取：获取页面内容、截图、提取特定元素文本
  - 等待：等待元素出现、页面加载完成、网络请求完成

why: |
  很多实际任务需要操作有界面的系统，但这些系统没有 API：
  - 在特定网站搜索并提取信息
  - 自动填写政府/企业的 Web 表单
  - 操作内部系统（ERP/CRM）完成工作流

  传统方法（爬虫）无法处理 JavaScript 渲染、登录、验证码；
  Browser Automation + AI 可以像人一样操作浏览器，
  理解页面语义，处理复杂的动态交互。

mental_model: |
  Browser Automation = 给 AI 装了一双眼睛和一双手
  - 眼睛（截图/DOM 提取）：Agent 可以"看"到当前页面
  - 手（点击/输入）：Agent 可以操作页面
  - 大脑（LLM）：理解"要做什么"，决定"点哪里/输入什么"

  之前 AI 只能回答"你应该去政府网站填表"；
  现在 AI 可以直接帮你打开网站、找到表单、填写提交。

browser_use_example: |
  # Browser-Use：AI 控制浏览器完成任务
  from browser_use import Agent as BrowserAgent
  from langchain_openai import ChatOpenAI

  llm = ChatOpenAI(model="gpt-4o")

  browser_agent = BrowserAgent(
      task="在 Amazon 上搜索'机械键盘'，找到评分最高的产品，获取其价格和评价数量",
      llm=llm
  )

  # Agent 自动控制浏览器：
  # 1. 打开 amazon.com
  # 2. 搜索"机械键盘"
  # 3. 按评分排序
  # 4. 提取第一个产品的价格和评价数
  result = await browser_agent.run()
  print(result)  # {"price": "$89.99", "reviews": 12847, "rating": 4.5}

playwright_direct: |
  # 直接用 Playwright（更底层控制）
  from playwright.async_api import async_playwright

  async def fill_government_form(name: str, id_number: str):
      async with async_playwright() as p:
          browser = await p.chromium.launch(headless=True)
          page = await browser.new_page()

          # 导航
          await page.goto("https://example-gov.com/form")
          await page.wait_for_load_state("networkidle")

          # 填写表单
          await page.fill("#name-input", name)
          await page.fill("#id-input", id_number)
          await page.select_option("#type-select", "personal")

          # 截图确认
          await page.screenshot(path="form-filled.png")

          # 提交
          await page.click("#submit-button")
          await page.wait_for_selector(".success-message")

          content = await page.inner_text(".success-message")
          await browser.close()
          return content

security_risks: |
  Browser Automation 的安全风险（必须重视）：
  1. 权限过高：Agent 可以访问用户登录的所有网站，包括银行、邮箱
  2. 数据泄露：Agent 截图可能包含敏感信息
  3. 误操作风险：Agent 可能点击"删除"、"提交"等不可逆操作
  4. 会话劫持：恶意页面可能诱导 Agent 执行恶意操作

best_practices:
  - "在独立 Browser Profile 中运行：不使用用户的已登录会话，使用专用账号"
  - "关键操作加 Human-in-the-Loop：删除/提交/支付等操作前截图给人确认"
  - "限制可访问域名白名单：只允许 Agent 访问业务相关的网站"
  - "所有截图和操作日志存档：便于审计和故障排查"
  - "无头模式（headless）生产，有头模式（headed）调试"

anti_patterns:
  - pattern: "给 Agent 使用用户的真实浏览器会话（含个人登录状态）"
    consequence: "Agent 误操作可能删除真实数据；恶意页面可以通过 Agent 操控用户账号"
  - pattern: "不设 timeout，让 Agent 无限等待页面元素"
    consequence: "页面加载失败或结构变化时，Agent 永久挂起"
  - pattern: "对所有操作全自动无审核"
    consequence: "任何一个误判都可能导致不可逆操作（下单/删除/发送）"

