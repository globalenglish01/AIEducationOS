best_practices:
  - "Prompt 文件和代码放同一个 Git 仓库：确保 Code Review 覆盖 Prompt 变更"
  - "Prompt 改动必须附带测试结果：改前评分多少，改后多少，决不盲目上线"
  - "生产 Prompt 只能通过 CI/CD 更新：不允许直接编辑生产环境的 Prompt"
  - "保留至少 3 个历史版本：快速回滚的安全网"

anti_patterns:
  - pattern: "把 Prompt 硬编码在业务代码中（而不是独立文件）"
    consequence: "Prompt 改动需要发代码包，无法独立部署；Code Review 中容易忽视"
  - pattern: "Prompt 改动不写 CHANGELOG，不附带测试结果"
    consequence: "出问题时无法判断哪次改动引起，也无法量化改动效果"

