summary: "将 Prompt 作为代码管理：存入 Git 版本控制、与代码分离、支持 A/B 测试和回滚，防止'Prompt 随意改动导致系统行为突变'。"

definition: |
  Prompt Version Control 是将 Prompt 视为重要软件资产、
  应用工程化管理实践的方法论：
  - 版本化：每个 Prompt 有版本号（v1.0, v1.1），变更有记录
  - 存储：Prompt 存入 Git 或专用 Prompt 管理系统
  - 与代码分离：Prompt 与业务代码分开存储，可独立部署
  - 测试：Prompt 变更有回归测试，不轻易改动生产 Prompt
  - 回滚：Prompt 变差时可快速回滚到上一个版本

why: |
  未管理 Prompt 的典型事故：
  - 工程师在代码里修改了一行 Prompt，系统输出质量突变
  - 没有记录是谁在什么时候改的 Prompt，无法排查
  - Prompt 改坏了，没有办法快速回滚
  - 多环境（dev/staging/prod）的 Prompt 版本不一致

  Prompt 是 AI 系统最核心的配置，必须像代码一样管理。

mental_model: |
  Prompt 版本控制 = 数据库 Schema 管理
  - 数据库 Schema 改动需要 Migration 文件，有版本记录，可回滚
  - Prompt 改动同样：需要版本号，有变更日志，可回滚
  任何一个没有记录的 Schema 改动都可能引发生产事故；
  同理，任何没有记录的 Prompt 改动都可能引发 AI 系统行为异常。

directory_structure: |
  prompts/
  ├── system/
  │   ├── research_agent_v1.txt       # 版本化 Prompt 文件
  │   ├── research_agent_v2.txt       # 新版本
  │   └── research_agent_latest.txt  # 软链接到当前生产版本
  ├── user_templates/
  │   └── query_template.txt
  └── CHANGELOG.md                    # Prompt 变更日志

implementation: |
  # 方案1：文件 + 环境变量
  import os
  from pathlib import Path

  PROMPT_DIR = Path("prompts/system")

  def load_prompt(name: str, version: str = "latest") -> str:
      """加载指定版本的 Prompt"""
      # 生产环境通过环境变量控制版本
      env_version = os.getenv(f"PROMPT_VERSION_{name.upper()}", version)
      prompt_file = PROMPT_DIR / f"{name}_v{env_version}.txt"

      if not prompt_file.exists():
          raise FileNotFoundError(f"Prompt not found: {prompt_file}")

      return prompt_file.read_text(encoding="utf-8")

  # 使用：
  system_prompt = load_prompt("research_agent")  # 加载 latest
  system_prompt_v1 = load_prompt("research_agent", version="1")  # 加载特定版本

  # 方案2：数据库存储（支持 A/B 测试）
  class PromptRegistry:
      def __init__(self, db):
          self.db = db

      def get_prompt(self, name: str, user_id: str = None) -> dict:
          """支持 A/B 测试的 Prompt 加载"""
          active_prompts = self.db.query("""
              SELECT version, content, traffic_weight
              FROM prompts
              WHERE name = ? AND status = 'active'
          """, (name,))

          # A/B 测试：按流量权重随机分配
          prompt = weighted_random_choice(active_prompts)
          return {
              "content": prompt["content"],
              "version": prompt["version"]
          }

      def rollback(self, name: str, target_version: str):
          """回滚到指定版本"""
          self.db.execute("""
              UPDATE prompts SET status = 'inactive' WHERE name = ?
          """, (name,))
          self.db.execute("""
              UPDATE prompts SET status = 'active'
              WHERE name = ? AND version = ?
          """, (name, target_version))

