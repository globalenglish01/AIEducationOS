  - "JWT 的 HS256 和 RS256 各适合什么场景？"
  - "如何在 JWT 中携带 AI 配额信息以减少数据库查询？"
  - "JWT 过期时间应该设多长？如何处理过期？（L2+ 考察）"

exam_points:
  - "JWT Payload：user_id + tenant_id + roles + ai_quota，无状态认证"
  - "tenant_id 从 JWT 取，不从请求体取：防 IDOR"
  - "生产用 RS256：私钥签名，公钥验证，公钥可分发"
  - "JWT 不存敏感信息：Payload 是 Base64 编码，不是加密"

one_liner: "AI 系统的 JWT = 带门禁信息的工牌：user_id/tenant_id/quota 写在 Token 里，无状态验证，tenant_id 必须从 Token 取以防越权访问。"
