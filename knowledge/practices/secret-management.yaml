  - "生产环境的 Secret 应该存在哪里？为什么不用环境变量？"
  - "密钥轮换的步骤是什么？为什么不能直接删除旧 Key？"
  - "如何在 CI/CD 中安全地使用 Secret？（L2+ DevOps 考察）"

exam_points:
  - "Secret 绝不出现在代码中：开发用 .env（.gitignore），生产用 Vault/Secrets Manager"
  - ".env.example 提交 Git 展示变量名，.env 本身不提交"
  - "IAM Role 自动认证：服务不需要硬编码 Vault 密码"
  - "配置 pre-commit 扫描：提交时阻止密钥进入 Git 历史"

one_liner: "Secret Management = 银行保险柜：API Key 绝不硬编码，开发用 .env（不提交 Git），生产用 Vault/Secrets Manager，服务靠 IAM Role 自动取钥。"
difficulty: beginner
