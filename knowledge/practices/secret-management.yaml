id: "KN-B-000005"
type: Practice
name: "Secret Management（密钥安全管理）"
version: "1.0"
last_updated: "2026-06-20"
status: active
level: "L1-L2"
tags:
  - practice
  - security
  - devops
  - secrets

aliases:
  - "密钥管理"
  - "API Key 安全"
  - "敏感配置管理"

summary: "AI 系统中 API Key、数据库密码等敏感信息的安全存储和访问实践：禁止硬编码，使用环境变量或 Vault 管理，防止密钥泄露。"

definition: |
  Secret Management 是 AI 系统敏感配置（Secrets）的管理实践：
  - Secret 类型：LLM API Key（OpenAI/Anthropic）、数据库密码、
    JWT 私钥、第三方 API Token、加密密钥
  - 核心原则：Secret 绝不出现在代码中（包括注释）
  - 存储层次：
    * 开发：.env 文件（不提交 Git）
    * CI/CD：平台内置 Secret 存储（GitHub Secrets / GitLab CI Variables）
    * 生产：专用 Secret 管理服务（AWS Secrets Manager / HashiCorp Vault）

why: |
  AI 系统比传统应用面临更高的 Secret 泄露风险：
  - LLM 调用日志可能记录包含 API Key 的请求头
  - Agent 可能在 Prompt 或输出中暴露配置信息
  - GitHub 仓库搜索攻击：大量开发者把 API Key 推送到 GitHub

  OpenAI API Key 泄露的实际后果：
  - 攻击者用你的 Key 大量调用 API，费用由你承担
  - 生产服务因 Key 被封停而不可用
  - 用户数据可能被攻击者提取

mental_model: |
  Secret Management = 银行保险柜
  - 不把密码写在门口（不硬编码在代码里）
  - 不把保险柜密码写在便利贴上（不写在 .env.example 里）
  - 银行职员凭工牌才能取到保险柜（服务用 IAM 角色访问 Vault）
  - 不同职员只能打开自己权限内的柜子（最小权限原则）

anti_pattern_examples: |
  # ❌ 反模式1：硬编码在代码中（最危险）
  import openai
  openai.api_key = "sk-proj-abc123..."  # 直接写死，提交到 Git = 泄露

  # ❌ 反模式2：写在 .env 并提交 Git
  # .gitignore 没有包含 .env，导致密钥上传

  # ❌ 反模式3：通过日志打印出来
  logger.info(f"Using API key: {api_key}")  # 日志里留下 Key

correct_implementation: |
  # ✅ 方案1：环境变量（开发/小规模部署）
  import os
  from dotenv import load_dotenv  # 加载 .env 文件（不提交 Git）

  load_dotenv()
  OPENAI_API_KEY = os.getenv("OPENAI_API_KEY")
  if not OPENAI_API_KEY:
      raise EnvironmentError("OPENAI_API_KEY is not set")

  # ✅ 方案2：AWS Secrets Manager（生产推荐）
  import boto3
  import json

  def get_secret(secret_name: str, region: str = "us-east-1") -> dict:
      """从 AWS Secrets Manager 安全获取密钥"""
      client = boto3.client("secretsmanager", region_name=region)
      response = client.get_secret_value(SecretId=secret_name)
      return json.loads(response["SecretString"])

  # 使用（服务通过 IAM Role 自动获得权限，无需硬编码 AWS 凭证）
  secrets = get_secret("prod/ai-service/api-keys")
  openai_key = secrets["OPENAI_API_KEY"]
  anthropic_key = secrets["ANTHROPIC_API_KEY"]

  # ✅ 方案3：HashiCorp Vault（跨云/自托管）
  import hvac

  client = hvac.Client(url="https://vault.internal.company.com")
  # 通过 Kubernetes Service Account 或 AWS IAM 自动认证（不用密码）
  client.auth.kubernetes.login(role="ai-service", jwt=k8s_service_account_jwt())

  secrets = client.secrets.kv.v2.read_secret_version(path="ai-service/prod")
  openai_key = secrets["data"]["data"]["OPENAI_API_KEY"]

gitignore_template: |
  # .gitignore（必须包含这些）
  .env
  .env.local
  .env.production
  *.key
  *.pem
  secrets.yaml
  credentials.json

env_example_pattern: |
  # .env.example（提交 Git，展示需要哪些变量，但不包含真实值）
  OPENAI_API_KEY=your-openai-api-key-here
  ANTHROPIC_API_KEY=your-anthropic-api-key-here
  DATABASE_URL=postgresql://user:password@host/dbname
  JWT_SECRET=your-jwt-secret-key
  VECTOR_DB_URL=your-vector-db-url

key_rotation: |
  # 密钥轮换（定期更换 Key，降低泄露影响）
  # 最佳实践：
  # 1. 生成新 Key
  # 2. 在 Secrets Manager 中添加新 Key（保持旧 Key 有效）
  # 3. 部署服务使用新 Key
  # 4. 验证新 Key 工作正常
  # 5. 废弃/删除旧 Key

  # OpenAI 推荐：每 90 天轮换一次 API Key

secret_scanning: |
  # 使用 git-secrets 或 GitHub 的 Secret Scanning 防止意外提交
  # 安装 git-secrets 钩子：
  # git secrets --install
  # git secrets --register-aws

  # 或者使用 pre-commit hook：
  # .pre-commit-config.yaml
  # repos:
  #   - repo: https://github.com/trufflesecurity/trufflehog
  #     hooks:
  #       - id: trufflehog

best_practices:
  - "开发用 .env + dotenv，但 .env 必须在 .gitignore 中"
  - "CI/CD 用平台内置 Secret 存储（不要在 CI 脚本里写明文）"
  - "生产用 AWS Secrets Manager / Vault，服务通过 IAM Role 自动认证"
  - "配置 git-secrets 或 pre-commit hook：提交时自动扫描是否包含密钥模式"
  - "API Key 设置使用限制：IP 白名单、最大请求数，即使泄露也限制损失"

anti_patterns:
  - pattern: "API Key 硬编码在代码文件中提交 Git"
    consequence: "公开仓库立即暴露；私有仓库也难以彻底清除（Git 历史）"
  - pattern: ".env 文件提交到 Git 仓库"
    consequence: "密钥进入 Git 历史，即使后续删除文件，历史中仍可找到"
  - pattern: "所有环境（dev/staging/prod）使用同一套 API Key"
    consequence: "dev 环境密钥泄露直接影响生产；无法单独轮换特定环境的 Key"

