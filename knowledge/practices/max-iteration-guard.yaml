interview_points:
  - "为什么 Agent 必须设置 max_iterations？常见的无限循环原因是什么？"
  - "max_iterations 和 timeout 的区别是什么？为什么两者都需要设置？"
  - "Agent 达到 max_iterations 后应该怎么处理？直接报错还是返回部分结果？"
  - "不同类型的 Agent 任务应该设置什么量级的 max_iterations？（L2 判断题）"

exam_points:
  - "Max Iteration Guard：硬性循环次数上限，防止 Agent 无限运行"
  - "与 Timeout 互补：Iteration 限轮数，Timeout 限总时间，两者同时设置"
  - "达到上限：返回部分结果 + 警告，不要直接报错丢弃所有进度"
  - "推荐范围：简单任务 5-10，复杂任务 20-30，超过 30 需重新设计"

one_liner: "Max Iteration Guard = 赛跑步数限制：Agent 最多跑 N 轮，超出就停止返回最佳中间结果，与 Timeout 共同防止 Agent 无限循环消耗资源。"
difficulty: beginner
