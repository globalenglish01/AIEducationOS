component_1_structured_logging: |
  ## 组件 1：结构化日志系统

  ```python
  # logging_setup.py
  import logging
  import json
  import sys
  from datetime import datetime

  class JSONFormatter(logging.Formatter):
      """将日志格式化为机器可读的 JSON"""
      def format(self, record: logging.LogRecord) -> str:
          log_entry = {
              "timestamp": datetime.utcnow().isoformat() + "Z",
              "level": record.levelname,
              "logger": record.name,
              "message": record.getMessage(),
          }
          # 将 extra 字段合并进去
          extra_fields = {k: v for k, v in record.__dict__.items()
                         if k not in logging.LogRecord.__dict__
                         and k not in ('message', 'asctime')}
          log_entry.update(extra_fields)
          return json.dumps(log_entry, ensure_ascii=False)

  def setup_logging(level: str = "INFO") -> logging.Logger:
      handler = logging.StreamHandler(sys.stdout)
      handler.setFormatter(JSONFormatter())
      logger = logging.getLogger("agent")
      logger.addHandler(handler)
      logger.setLevel(getattr(logging, level))
      return logger

  logger = setup_logging()

  # 使用示例：
  logger.info("agent.start", extra={
      "trace_id": "abc123",
      "user_id": "user_001",
      "tenant_id": "tenant_a"
  })
  # 输出：{"timestamp":"2026-06-20T...", "level":"INFO",
  #        "message":"agent.start", "trace_id":"abc123", ...}
  ```

component_2_token_counter: |
  ## 组件 2：Token 成本追踪

  ```python
  # token_tracker.py
  from dataclasses import dataclass, field
  from typing import Dict

  # OpenAI 当前定价（美元/1K tokens）
  MODEL_PRICING = {
      "gpt-4o": {"input": 0.005, "output": 0.015},
      "gpt-4o-mini": {"input": 0.000150, "output": 0.000600},
      "claude-3-5-sonnet": {"input": 0.003, "output": 0.015},
  }

  @dataclass
  class TokenUsage:
      model: str
      prompt_tokens: int = 0
      completion_tokens: int = 0

      @property
      def total_tokens(self) -> int:
          return self.prompt_tokens + self.completion_tokens

      @property
      def estimated_cost_usd(self) -> float:
          pricing = MODEL_PRICING.get(self.model, {"input": 0, "output": 0})
          return (self.prompt_tokens * pricing["input"] +
                  self.completion_tokens * pricing["output"]) / 1000

  class CostTracker:
      def __init__(self, budget_usd: float = 1.0):
          self.budget_usd = budget_usd
          self.usages: list[TokenUsage] = []

      def record(self, model: str, prompt_tokens: int, completion_tokens: int):
          usage = TokenUsage(model, prompt_tokens, completion_tokens)
          self.usages.append(usage)

          total_cost = self.total_cost_usd
          if total_cost > self.budget_usd:
              raise BudgetExceededException(
                  f"成本 ${total_cost:.4f} 超出预算 ${self.budget_usd}"
              )
          return usage

      @property
      def total_cost_usd(self) -> float:
          return sum(u.estimated_cost_usd for u in self.usages)

      @property
      def total_tokens(self) -> int:
          return sum(u.total_tokens for u in self.usages)

      def summary(self) -> dict:
          return {
              "total_tokens": self.total_tokens,
              "total_cost_usd": round(self.total_cost_usd, 6),
              "by_model": {
                  model: sum(u.total_tokens for u in self.usages if u.model == model)
                  for model in set(u.model for u in self.usages)
              }
          }

  class BudgetExceededException(Exception):
      pass
  ```

component_3_retry_with_backoff: |
  ## 组件 3：指数退避重试

  ```python
  # retry.py
  import asyncio
  import random
  from typing import TypeVar, Callable, Awaitable

  T = TypeVar("T")

  async def retry_with_backoff(
      fn: Callable[[], Awaitable[T]],
      max_retries: int = 3,
      base_delay: float = 1.0,
      jitter: bool = True,
      retryable_errors: tuple = (Exception,)
  ) -> T:
      """指数退避重试：1s, 2s, 4s（加随机抖动防止雷群效应）"""
      last_error = None

      for attempt in range(max_retries):
          try:
              return await fn()
          except retryable_errors as e:
              last_error = e
              if attempt == max_retries - 1:
                  raise

              delay = base_delay * (2 ** attempt)
              if jitter:
                  delay *= (0.5 + random.random())  # ±50% 抖动

              logger.warning("agent.retry", extra={
                  "attempt": attempt + 1,
                  "max_retries": max_retries,
                  "delay_seconds": round(delay, 2),
                  "error": str(e)[:100]
              })
              await asyncio.sleep(delay)

      raise last_error
  ```

component_4_full_harness: |
  ## 组件 4：完整 Agent Harness

  ```python
  # agent_harness.py
  import asyncio
  import uuid
  import time
  from typing import Any

  class AgentHarness:
      def __init__(
          self,
          budget_usd: float = 1.0,
          max_iterations: int = 15,
          timeout: float = 300.0
      ):
          self.budget_usd = budget_usd
          self.max_iterations = max_iterations
          self.timeout = timeout

      async def run(
          self,
          agent,
          input_data: dict,
          user_context: dict = None
      ) -> dict:
          trace_id = str(uuid.uuid4())[:8]
          cost_tracker = CostTracker(self.budget_usd)
          start_time = time.monotonic()
          user_ctx = user_context or {}

          logger.info("agent.start", extra={
              "trace_id": trace_id,
              **user_ctx
          })

          try:
              async with asyncio.timeout(self.timeout):
                  result = await retry_with_backoff(
                      lambda: agent.ainvoke(
                          input_data,
                          config={"recursion_limit": self.max_iterations * 2}
                      ),
                      max_retries=3,
                      retryable_errors=(Exception,)
                  )
          except asyncio.TimeoutError:
              logger.error("agent.timeout", extra={
                  "trace_id": trace_id,
                  "elapsed_seconds": time.monotonic() - start_time
              })
              raise
          except BudgetExceededException as e:
              logger.error("agent.budget_exceeded", extra={
                  "trace_id": trace_id,
                  "cost_summary": cost_tracker.summary()
              })
              raise

          elapsed = time.monotonic() - start_time
          logger.info("agent.complete", extra={
              "trace_id": trace_id,
              "elapsed_ms": int(elapsed * 1000),
              "cost_summary": cost_tracker.summary(),
              **user_ctx
          })
          return result
  ```

component_5_fastapi_service: |
  ## 组件 5：FastAPI 生产服务

  ```python
  # main.py
  from fastapi import FastAPI, Depends
  from contextlib import asynccontextmanager
  import time

  @asynccontextmanager
  async def lifespan(app: FastAPI):
      # 启动时：预热 Agent
      logger.info("service.starting")
      app.state.agent = create_react_agent(llm, tools)
      app.state.harness = AgentHarness(budget_usd=0.5, timeout=120.0)
      logger.info("service.ready")
      yield
      # 关闭时：清理资源
      logger.info("service.shutting_down")

  app = FastAPI(lifespan=lifespan)

  @app.get("/health")
  async def health_check():
      """健康检查端点（监控系统探活）"""
      return {
          "status": "healthy",
          "timestamp": time.time(),
          "agent_ready": hasattr(app.state, "agent")
      }

  @app.post("/api/v1/chat")
  async def chat(
      request: ChatRequest,
      token_data: TokenData = Depends(verify_jwt)
  ):
      masked_message, pii_found = detect_and_mask_pii(request.message)
      try:
          result = await app.state.harness.run(
              app.state.agent,
              {"messages": [{"role": "user", "content": masked_message}]},
              user_context={
                  "user_id": token_data.user_id,
                  "tenant_id": token_data.tenant_id
              }
          )
          return {
              "response": result["messages"][-1].content,
              "pii_detected": pii_found
          }
      except asyncio.TimeoutError:
          from fastapi import HTTPException
          raise HTTPException(status_code=504, detail="Agent 处理超时")
  ```

