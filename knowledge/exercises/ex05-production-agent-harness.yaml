load_testing: |
  ## 压力测试（验证生产可靠性）

  ```python
  # load_test.py
  import asyncio
  import httpx
  import time

  async def single_request(client: httpx.AsyncClient, token: str) -> dict:
      start = time.time()
      resp = await client.post(
          "http://localhost:8000/api/v1/chat",
          json={"message": "计算 2 的 10 次方"},
          headers={"Authorization": f"Bearer {token}"}
      )
      return {
          "status": resp.status_code,
          "latency": time.time() - start
      }

  async def load_test(concurrency: int = 10, total_requests: int = 50):
      token = generate_test_token("test_user", "test_tenant")
      async with httpx.AsyncClient(timeout=30) as client:
          semaphore = asyncio.Semaphore(concurrency)
          async def bounded_request():
              async with semaphore:
                  return await single_request(client, token)

          results = await asyncio.gather(*[bounded_request() for _ in range(total_requests)])

      latencies = [r["latency"] for r in results if r["status"] == 200]
      errors = sum(1 for r in results if r["status"] != 200)
      print(f"总请求：{total_requests}，错误：{errors}")
      print(f"延迟 P50：{sorted(latencies)[len(latencies)//2]:.2f}s")
      print(f"延迟 P99：{sorted(latencies)[int(len(latencies)*0.99)]:.2f}s")
  ```

