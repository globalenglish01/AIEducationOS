common_mistakes:
  - mistake: "@tool 的 docstring 写得太简单（'执行搜索'）"
    fix: "工具的 docstring 就是 LLM 理解工具的全部依据，必须清楚说明：用途、参数、何时调用"

  - mistake: "工具函数 raise Exception，而非返回错误字符串"
    fix: "Agent 通过 Observation 感知失败；Exception 会打断整个循环。工具失败应 return 错误描述字符串"

  - mistake: "不看 stream 输出，不理解内部循环"
    fix: "用 stream_mode='values' 看每一步，这是理解 ReAct 的最直接方式"

