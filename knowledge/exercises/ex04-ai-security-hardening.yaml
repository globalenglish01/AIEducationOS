common_mistakes:
  - mistake: "IDOR 修复只加了应用层检查，忘了数据库层"
    fix: "数据库查询也要加 AND user_id = ? 条件，应用层 + 数据库层双重防护"

  - mistake: "Prompt Injection 防护只靠关键词过滤"
    fix: "关键词过滤不可靠（绕过方式太多）；正确做法是结构隔离：用户输入永远在 user 消息，不进 system"

  - mistake: "PII 脱敏日志记录了原始内容（脱敏等于白做）"
    fix: "日志只记录'检测到 PII'和类型，绝对不记录原始 PII 内容"

