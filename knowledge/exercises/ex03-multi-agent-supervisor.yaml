common_mistakes:
  - mistake: "Supervisor 的 Prompt 没有说明任务顺序，导致 Worker 顺序混乱"
    fix: "明确写'先派 research_worker，得到结果后再派 writer_worker'"

  - mistake: "两个 Worker 使用完全相同的 System Prompt"
    fix: "每个 Worker 的 Prompt 必须明确职责边界，否则它们会做重复的工作"

  - mistake: "Writer Worker 也给了搜索工具（工具权限没有最小化）"
    fix: "Writer 不需要搜索，只需要整理；给额外工具会让 LLM 倾向于调用不必要的工具"

