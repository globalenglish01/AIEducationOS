  single_agent = create_react_agent(
      llm_large,
      tools=[search_information, format_as_markdown],
      prompt="你是全能研究助手，负责研究并撰写报告"
  )

  # Multi-Agent：Supervisor + Research + Writer
  # ... （上面已实现）

  # 比较：
