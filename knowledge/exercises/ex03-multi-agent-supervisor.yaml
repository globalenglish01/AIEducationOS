project_goal: |
  ## 项目目标

  构建一个"AI 技术研究助手"：
  用户提出研究主题 → Supervisor 分析 → 派给专业 Worker → 输出完整报告

  架构：
  用户输入
    → Supervisor Agent（任务分解 + 调度）
      → Research Worker（搜索信息、收集资料）
      → Writer Worker（整理、撰写报告）
    → 最终报告返回给用户

task_1_define_workers: |
  ## 任务 1：定义两个专业化 Worker

  ```python
  from langgraph.prebuilt import create_react_agent
  from langchain_openai import ChatOpenAI
  from langchain_core.tools import tool
  import requests

  llm_large = ChatOpenAI(model="gpt-4o", temperature=0)
  llm_small = ChatOpenAI(model="gpt-4o-mini", temperature=0)

  # 工具定义
  @tool
  def search_information(query: str) -> str:
      """搜索关于特定主题的信息"""
      url = f"https://api.duckduckgo.com/?q={query}&format=json&no_html=1"
      resp = requests.get(url, timeout=5)
      data = resp.json()
      abstract = data.get("AbstractText", "")
      related = [r["Text"] for r in data.get("RelatedTopics", [])[:5]]
      results = []
      if abstract:
          results.append(f"主要信息：{abstract}")
      if related:
          results.append("相关信息：\n" + "\n".join(related))
      return "\n".join(results) if results else "未找到相关信息"

  @tool
  def format_as_markdown(content: str, title: str) -> str:
      """将内容整理为 Markdown 格式的报告"""
      return f"# {title}\n\n{content}"

  # Worker 1：研究专家（只有搜索工具）
  research_worker = create_react_agent(
      llm_large,                        # 用大模型：研究需要理解复杂信息
      tools=[search_information],
      name="research_worker",
      prompt="""你是专业研究员，负责收集和整理信息。
      工作规则：
      1. 针对主题进行 2-3 次不同角度的搜索
      2. 整合搜索结果，提取关键事实
      3. 以结构化方式输出：背景、现状、趋势、关键数据
      4. 只输出信息，不写报告（那是 Writer 的工作）
      5. 如果某个搜索没有找到有用信息，换一个搜索词再试"""
  )

  # Worker 2：写作专家（只有格式化工具）
  writer_worker = create_react_agent(
      llm_small,                        # 用小模型：写作是格式化任务，省成本
      tools=[format_as_markdown],
      name="writer_worker",
      prompt="""你是技术写作专家，负责将研究材料整理成专业报告。
      工作规则：
      1. 基于提供的研究材料写报告，不要添加没有依据的内容
      2. 报告结构：执行摘要（3-5句）/ 主要发现（3-5点）/ 结论
      3. 使用清晰的 Markdown 格式
      4. 保持客观，避免过度修饰"""
  )
  ```

task_2_create_supervisor: |
  ## 任务 2：创建 Supervisor

  ```python
  from langgraph_supervisor import create_supervisor

  supervisor = create_supervisor(
      llm_large,                          # Supervisor 用大模型
      agents=[research_worker, writer_worker],
      prompt="""你是研究项目主管，负责协调研究和写作工作。

      工作流程（严格按此顺序）：
      1. 分析用户的研究主题
      2. 派给 research_worker 收集相关信息
      3. 将 research_worker 的结果传给 writer_worker 撰写报告
      4. 汇总最终报告返回给用户

      注意：
      - 不要自己做研究或写作，只负责协调
      - research_worker 完成后再派 writer_worker
      - 如果 research_worker 的结果不够充分，让他再补充一次
      """,
      output_mode="last_message"
  ).compile()
  ```

  如果 langgraph-supervisor 包不可用，用手动实现：

  ```python
  from langgraph.graph import StateGraph, START, END
  from typing import TypedDict, Annotated
  import operator

  class SupervisorState(TypedDict):
      messages: Annotated[list, operator.add]
      research_result: str
      final_report: str

  def supervisor_node(state: SupervisorState) -> dict:
      """Supervisor：决定下一步派哪个 Worker"""
      msgs = state["messages"]
      last_msg = msgs[-1].content if msgs else ""

      # 简单路由逻辑：
      if not state.get("research_result"):
          return {"next": "research"}  # 先研究
      elif not state.get("final_report"):
          return {"next": "write"}     # 再写作
      else:
          return {"next": END}         # 完成

  # 构建图
  graph = StateGraph(SupervisorState)
  graph.add_node("supervisor", supervisor_node)
  graph.add_node("research", lambda s: {"research_result": run_research(s)})
  graph.add_node("write", lambda s: {"final_report": run_writing(s)})
  graph.add_edge(START, "supervisor")
  graph.add_conditional_edges("supervisor",
                               lambda s: s.get("next"),
                               {"research": "research", "write": "write", END: END})
  graph.add_edge("research", "supervisor")
  graph.add_edge("write", "supervisor")
  app = graph.compile()
  ```

task_3_test_system: |
  ## 任务 3：测试多 Agent 系统

  ```python
  test_topics = [
      "大型语言模型的量化技术（Quantization）",
      "2025 年 AI Agent 框架对比"
  ]

  for topic in test_topics:
      print(f"\n{'='*50}")
      print(f"研究主题：{topic}")
      print('='*50)

      result = supervisor.invoke({
          "messages": [{"role": "user", "content": f"请研究并写一份关于'{topic}'的报告"}]
      })
      print(result["messages"][-1].content)
  ```

  观察点：
  - Supervisor 是否正确地先派了 research_worker？
  - Writer 是否基于 research 结果写作（而非编造）？
  - 整个流程花了多少时间？调用了几次 LLM？

task_4_add_human_checkpoint: |
  ## 任务 4：添加 Human-in-the-Loop（进阶）

  ```python
  from langgraph.checkpoint.memory import MemorySaver

  # 在 Supervisor 决定写作之前，让人工确认研究结果
  checkpointer = MemorySaver()
  supervisor_with_hitl = supervisor.compile(
      checkpointer=checkpointer,
      interrupt_before=["write"]   # 写作节点前暂停
  )

  config = {"configurable": {"thread_id": "research-001"}}

  # 第一次运行：执行研究，在 write 节点前暂停
  result = supervisor_with_hitl.invoke(
      {"messages": [{"role": "user", "content": "研究 RAG 技术发展现状"}]},
      config=config
  )

  # 查看研究结果
  print("研究完成，等待确认：")
  print(result["messages"][-1].content)

  # 人工确认后继续（或修改研究方向）
  human_feedback = input("\n研究结果满意吗？(y/n)：")
  if human_feedback == 'y':
      # 继续到写作阶段
      final = supervisor_with_hitl.invoke(None, config=config)
      print("\n最终报告：")
      print(final["messages"][-1].content)
  else:
      # 让 research_worker 重新研究（更换角度）
      new_direction = input("请指定新的研究方向：")
      final = supervisor_with_hitl.invoke(
          {"messages": [{"role": "user", "content": f"重新研究，重点关注：{new_direction}"}]},
          config=config
      )
  ```

comparison_task: |
  ## 对比任务：Multi-Agent vs 单 Agent

  用相同的问题分别用单 Agent 和 Multi-Agent 解决：

