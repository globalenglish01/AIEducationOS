  - "UserProxyAgent 的作用是什么？为什么代码执行要用 Docker？"
  - "GroupChat 中 speaker_selection_method 有什么选项？各有什么特点？"
  - "为什么 AutoGen 更适合原型阶段，LangGraph 更适合生产？（L3+ 考察）"

exam_points:
  - "AutoGen 核心：Agent 对话驱动，AssistantAgent（推理）+ UserProxyAgent（执行）"
  - "代码执行必须 Docker 隔离：use_docker=True"
  - "vs LangGraph：AutoGen 对话驱动灵活但不可控；LangGraph 图结构可控但需要预设计"
  - "max_consecutive_auto_reply：防止无限对话循环的关键参数"

one_liner: "AutoGen = AI 版 Slack 群聊：多个 Agent 互相对话讨论，UserProxyAgent 负责真正执行代码，适合代码生成验证和多角色协商。"
difficulty: intermediate
