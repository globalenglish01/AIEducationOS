  - "ReAct 循环的终止条件有哪些？为什么必须设置 max_iterations？"
  - "ReAct 的 Thought 字段在调试中有什么用？（L2+ 考察）"

exam_points:
  - "ReAct = Thought（推理）→ Action（工具调用）→ Observation（观察结果）→ 循环"
  - "必须设置 max_iterations：防止无限循环，建议 10-20 次"
  - "Thought 是可观测的推理链路，是调试 Agent 行为的核心"
  - "Final Answer 出现即终止：不继续循环"

one_liner: "ReAct = 侦探破案：先推理（Thought）再行动（Action）再看证据（Observation），基于真实结果循环，而非凭感觉猜。"
difficulty: intermediate

