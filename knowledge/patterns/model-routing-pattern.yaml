      note: "Model Routing 是 Token Budget 超限时的降级手段之一"

interview_points:
  - "Model Routing 解决了什么问题？不做路由的成本代价是多少？"
  - "路由决策本身应该用什么方式实现？为什么不能用大模型做路由？"
  - "如何监控路由质量？什么指标说明路由策略需要调整？"
  - "路由不确定时应该偏向哪个模型？为什么？（L2+ 考察工程判断）"

exam_points:
  - "三级路由：规则（$0）→ 小模型（分类/提取）→ 大模型（推理/代码）"
  - "路由器本身用最便宜方式：规则 > 小模型，不用大模型做路由"
  - "不确定时偏向大模型：质量优先，错误路由比超支更危险"
  - "成本节省 40-60%，配合语义缓存效果更佳"

one_liner: "Model Routing = 智能分诊：按任务复杂度自动选模型，简单问题不占大模型资源，成本降 40-60% 且质量不打折。"
difficulty: intermediate
