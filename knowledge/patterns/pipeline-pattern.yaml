interview_points:
  - "Pipeline Pattern 和 Supervisor-Worker 各自适合什么场景？"
  - "如何避免 Pipeline 中某一步的输出过大导致后续步骤 Context 溢出？"
  - "Pipeline 中间某一步失败，如何做到不从头重跑？"
  - "什么情况下应该把 Pipeline 改成 Supervisor-Worker？（L2+ 考察判断力）"

exam_points:
  - "Pipeline = 固定顺序，单向流动，前步输出是后步输入"
  - "适合场景：步骤固定、不需要动态调度（文章生成、数据处理流程）"
  - "步骤间传结构化数据，不传完整历史：控制 Context 膨胀"
  - "配合 Checkpoint：中间步骤持久化，失败时从断点恢复而非重头"

one_liner: "Pipeline = 工厂流水线：多个专职 Agent 按固定顺序依次处理，前步产出是后步原料，简单清晰，适合流程固定的任务。"
difficulty: beginner
