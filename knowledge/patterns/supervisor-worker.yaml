interview_points:
  - "Supervisor-Worker 模式中，Supervisor 和 Worker 各自的职责是什么？"
  - "与 Pipeline 模式相比，Supervisor-Worker 的优势和代价是什么？"
  - "如何设计一个 Worker 失败时的容错机制？"
  - "为什么 Supervisor 应该用大模型，而部分 Worker 可以用小模型？（L3+ 考察成本意识）"

exam_points:
  - "Supervisor：任务分解+调度+汇总；Worker：专注子任务执行"
  - "vs Pipeline：Supervisor-Worker 动态调度，Pipeline 静态顺序"
  - "Worker 最小权限：只给完成任务所需的工具，不多给"
  - "Supervisor 不执行：只调度，保持全局视角"

one_liner: "Supervisor-Worker = 项目经理+专家团队：主控 Agent 分解任务派活，专业 Worker 各司其职并行执行，比单 Agent 更快更专。"
difficulty: advanced
