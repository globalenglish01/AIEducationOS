  - "Trace 和 Span 的关系是什么？Span 应该包含哪些字段？"
  - "主流 LLM Tracing 工具有哪些？你会如何选型？"
  - "Trace 数据的采样率应该如何设置？（L2+ 考察）"

exam_points:
  - "Tracing = 记录一次任务执行中所有操作的输入/输出/耗时，形成可追溯的链路"
  - "Trace = 一次完整任务；Span = 其中一个操作步骤"
  - "必须追踪：LLM 调用 / 向量检索 / 工具调用 / 错误异常"
  - "主流工具：LangSmith（LangChain 生态）/ LangFuse（开源可部署）"

one_liner: "Tracing = AI 的黑匣子，每一步 LLM 调用/检索/工具调用都有记录，出问题时精确定位原因。"
difficulty: advanced
