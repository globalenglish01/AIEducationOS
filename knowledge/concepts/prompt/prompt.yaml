summary: "发送给 LLM 的输入文本，是人与 AI 协作的接口——写好 Prompt 是 AI Native 工程的起点。"

definition: |
  Prompt 是发送给 LLM 的输入文本，包含任务指令、上下文信息、示例和约束条件。
  Prompt Engineering 是系统性地设计、测试和迭代 Prompt，
  以稳定地引导 LLM 产生期望输出的工程实践。
  在 AI 系统中，Prompt 是业务逻辑与 LLM 能力之间的桥梁。

why: |
  LLM 的能力是固定的（参数已训练好），但同一个模型面对不同的 Prompt，
  输出质量可以相差 10 倍以上。
  Prompt 是 AI Native Engineer 能直接控制的最重要变量：
  不需要改模型，不需要训练，只需要改 Prompt，就能大幅改变输出质量。
  这也是为什么"Prompt 是代码"——它必须被认真对待、版本控制、测试。

mental_model: |
  Prompt = 给实习生的工作说明书
  - 你怎么写说明书，实习生就怎么做
  - 说明书含糊 → 结果含糊
  - 说明书里有示例 → 结果更符合期望
  - 说明书规定了格式 → 输出格式稳定
  - 说明书越清晰，实习生越能发挥

  进阶类比：
  Prompt = 函数签名（对 LLM 来说）
  - System Prompt = 函数的文档字符串（定义行为边界）
  - User Message = 函数调用（传入具体参数）
  - LLM 输出 = 函数返回值

how_it_works: |
  完整的 Prompt 通常由三部分组成：
  ┌─────────────────────────────────────────────┐
  │ System Prompt（系统提示）                     │
  │ - 定义 AI 的角色和行为边界                    │
  │ - 例："你是一位严谨的代码审查专家..."          │
  ├─────────────────────────────────────────────┤
  │ Few-shot Examples（少样本示例）[可选]          │
  │ - 用示例展示期望的输入→输出格式                │
  ├─────────────────────────────────────────────┤
  │ User Message（用户输入）                      │
  │ - 当前具体的任务或问题                        │
  │ - 可注入动态内容（RAG 结果、变量等）           │
  └─────────────────────────────────────────────┘

core_principles:
  - "Prompt 是代码：必须版本控制、Code Review、自动测试，不允许随意修改生产 Prompt"
  - "明确优于模糊：具体的指令、格式要求、示例，比泛泛的描述效果好 10 倍"
  - "先 Why 后 What：告诉 LLM 为什么，比告诉它做什么更有效"
  - "System Prompt 与 User Input 必须严格隔离（防 Prompt Injection）"

examples:
  - scenario: "结构化输出"
    description: |
      System: 你是数据提取专家，永远以 JSON 格式输出，不输出任何其他内容。
      User: 从以下文本中提取姓名和邮箱：'联系张三，邮箱 zhang@example.com'
      Output: {"name": "张三", "email": "zhang@example.com"}
  - scenario: "Few-shot 引导"
    description: |
      System: 将用户输入分类为 positive/negative/neutral
      示例1 - Input: "产品很好用" → Output: positive
      示例2 - Input: "还行吧" → Output: neutral
      User: "这个东西烂透了" → Output: negative

counter_examples:
  - "不要把 Prompt 硬编码在业务代码里，应存入 prompts/ 目录统一管理"
  - "不要在 Prompt 里堆很多要求而不给示例——示例比说明有效得多"
  - "不要在一个 Prompt 里同时让 LLM 做多件事——拆分任务，每个 Prompt 只做一件事"

