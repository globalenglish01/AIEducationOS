common_misconceptions:
  - misconception: "Prompt 写得越长越好"
    correction: "Prompt 要精准，不要冗长。无关信息会干扰 LLM，降低输出质量。每个 Token 都有成本。"
  - misconception: "Prompt 调好了就永远好"
    correction: "模型更新、业务需求变化都会影响 Prompt 效果。必须建立持续的 Evaluation 体系监控 Prompt 质量。"
  - misconception: "Prompt Engineering 不需要测试"
    correction: "Prompt 改动必须经过 Evaluation（回归测试），就像代码改动要跑单元测试一样。"
  - misconception: "好的 Prompt 能解决一切问题"
    correction: "Prompt 是最易变、影响最直接的变量，但系统质量还取决于 RAG、Evaluation、模型选择等。Prompt 只占整体质量的约 30%。"

best_practices:
  - "所有 Prompt 存入 prompts/ 目录，用 Git 版本控制，像管理代码一样管理"
  - "Prompt 修改前后必须跑 Evaluation，确认质量没有退化"
  - "System Prompt 和 User Input 严格分离（防止 Prompt Injection）"
  - "给出输出格式示例（Few-shot），比文字描述格式更有效"
  - "在 System Prompt 中明确'不要做什么'，比只说'要做什么'效果更好"

anti_patterns:
  - pattern: "Prompt 硬编码在 Python 代码里的字符串中"
    consequence: "无法版本控制，无法 A/B 测试，修改风险高，难以跨团队协作"
  - pattern: "一个 Prompt 让 LLM 同时做5件事"
    consequence: "LLM 注意力分散，每件事都做得差，不如拆成5个独立 Prompt 串联"
  - pattern: "不测试 Prompt 就上生产"
    consequence: "质量问题在用户处暴露，无法量化影响范围，也无法快速定位原因"

interview_points:
  - "Prompt Engineering 为什么重要？它能在多大程度上影响 LLM 输出质量？"
  - "System Prompt 和 User Message 的区别是什么？为什么要分开？"
  - "Few-shot 是什么？相比 Zero-shot 有什么优势？"
  - "为什么说'Prompt 是代码'？在工程实践中意味着什么？"
  - "Prompt Injection 是什么？如何防御？（L2+ 考察）"
  - "如何管理生产环境的 Prompt 版本？如何测试 Prompt 修改的影响？（L2+ 考察）"

exam_points:
  - "Prompt 三部分：System Prompt + Few-shot Examples + User Message"
  - "Few-shot：提供输入→输出示例，帮助 LLM 理解期望格式和行为"
  - "Zero-shot：不提供示例，直接给任务描述"
  - "Prompt 版本控制：存入 prompts/ 目录，用 Git 管理，修改前后跑 Evaluation"
  - "System Prompt 作用：定义 AI 角色、行为边界、输出格式约束"

one_liner: "Prompt 是人与 LLM 的接口，写好它就是在'编程'——必须版本控制、测试、持续迭代。"
difficulty: beginner

