id: "KN-P-000001"
type: Concept
name: "System Prompt"
version: "1.0"
last_updated: "2026-06-19"
status: active
level: "L0-L1"
tags:
  - prompt-engineering
  - foundation
  - security

aliases:
  - "系统提示词"
  - "System Message"
  - "角色设定"

summary: "在对话开始前定义 AI 行为边界的特殊 Prompt，是每个 AI 应用最核心的控制手段。"

definition: |
  System Prompt 是在用户消息之前发送给 LLM 的特殊指令，
  用于定义 AI 的角色、行为规范、输出格式和边界条件。
  它在对话全程生效，优先级高于 User Message。
  System Prompt 是 AI 应用"个性化"的核心手段——
  同一个基础 LLM，通过不同的 System Prompt，可以变成客服机器人、代码助手或法律顾问。

why: |
  没有 System Prompt，每次对话 LLM 都从"通用助手"状态开始，
  无法保持一致的角色、格式和行为约束。
  System Prompt 让 AI 应用具备"记忆"——不是对话历史的记忆，
  而是对"自己是谁、应该怎么做"的记忆。

mental_model: |
  System Prompt = 员工手册
  - 在正式上岗前，公司给员工一份手册，定义行为准则
  - 不管客户（User）说什么，员工都在手册规定的范围内行事
  - 客户无法通过"你是自由的"来绕过手册（理想情况下）

how_it_works: |
  API 调用结构：
  messages = [
    {"role": "system",    "content": "你是一位严谨的代码审查专家..."},  ← System Prompt
    {"role": "user",      "content": "帮我看看这段代码"},               ← User Message
    {"role": "assistant", "content": "这段代码有以下问题..."},           ← 历史回复
    {"role": "user",      "content": "那怎么修复？"},                   ← 当前问题
  ]

core_principles:
  - "System Prompt 和 User Input 必须严格分离——这是防 Prompt Injection 的基础"
  - "System Prompt 定义'不变量'：角色、格式、边界；User Message 提供'变量'：具体任务"
  - "System Prompt 越清晰具体，LLM 越稳定——模糊的 System Prompt 带来不稳定的行为"

best_practices:
  - "明确定义输出格式（如'永远以 JSON 输出，不输出其他内容'）"
  - "明确定义边界（如'不回答与代码无关的问题'）"
  - "在 System Prompt 中注入关键约束，而不是每次在 User Message 里重复"
  - "System Prompt 单独存文件，版本控制，不内嵌在业务代码里"

anti_patterns:
  - pattern: "System Prompt 过于简短（如'你是助手'）"
    consequence: "行为不稳定，LLM 自由发挥，输出格式不一致"
  - pattern: "将用户输入直接拼接进 System Prompt"
    consequence: "Prompt Injection 漏洞——用户可以覆盖 System Prompt 的指令"

relationships:
  prerequisites:
    - id: "KN-C-000010"
      note: "System Prompt 是 Prompt 的核心组成部分"
  related_concepts:
    - id: "KN-C-000040"
      note: "Prompt Injection 的主要攻击目标就是绕过 System Prompt"

interview_points:
  - "System Prompt 的作用是什么？和 User Message 的区别？"
  - "为什么 System Prompt 和 User Input 必须严格分离？"
  - "如何用 System Prompt 稳定控制输出格式？"
  - "Prompt Injection 是什么？System Prompt 如何防御？（L2+）"

exam_points:
  - "System Prompt 优先级高于 User Message，在对话全程生效"
  - "System Prompt = 角色定义 + 行为规范 + 输出格式 + 边界条件"
  - "防 Prompt Injection：严格隔离 System Prompt 和 User Input，不拼接"

one_liner: "System Prompt 是 AI 的员工手册——定义它是谁、能做什么、怎么输出，全程生效。"
difficulty: beginner

references:
  - "OpenAI System Message 文档: https://platform.openai.com/docs/guides/text-generation"
