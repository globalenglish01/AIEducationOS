  - "为什么 ReAct 比单纯的 CoT 更适合 Agent 场景？"
  - "如何防止 ReAct Agent 无限循环？"
  - "Thought 的可解释性对系统有什么价值？"
  - "ReAct 和 LangGraph 的 Node/Edge 有什么对应关系？（L2+）"

exam_points:
  - "ReAct = Reasoning（Thought）+ Acting（Action + Observation）的循环"
  - "终止条件：任务完成 OR 达到 max_iterations OR 超时"
  - "Thought 的作用：解释决策过程，使 Agent 行为可解释、可调试"
  - "ReAct 是绝大多数 Agent 框架的底层运行逻辑"

one_liner: "ReAct = 思考→行动→观察→循环，是 Agent 能'自主完成任务'的底层引擎。"
difficulty: intermediate

