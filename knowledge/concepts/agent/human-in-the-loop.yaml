id: "KN-C-000024"
type: Pattern
name: "Human-in-the-Loop (HITL)"
version: "1.0"
last_updated: "2026-06-19"
status: active
level: "L2-L3"
tags:
  - agent
  - safety
  - governance
  - pattern

aliases:
  - "HITL"
  - "人机协作"
  - "Interrupt & Approve"

summary: "在 Agent 执行流程中设置检查点，让人类在关键决策或高风险操作前审批，兼顾自动化效率和安全可控。"

definition: |
  Human-in-the-Loop（HITL）是一种 Agent 设计模式：
  在 Agent 执行流程的特定节点（Interrupt Point），
  暂停执行并等待人类审批（Approve/Reject/Modify），
  通过后才继续执行下一步。
  HITL 是 AI 系统"自主化程度"和"安全可控性"的平衡手段，
  是生产级 Agent 系统中不可缺少的设计。

why: |
  全自动 Agent 的问题：
  - 不可逆操作（删除文件、发送邮件、转账）一旦执行错误无法撤销
  - LLM 可能在复杂场景下产生幻觉，执行错误的工具调用
  - 法规要求（金融、医疗）：特定操作必须有人工审批记录
  纯人工的问题：失去自动化效率，人工成本高
  HITL 是折中：把人力聚焦在"人类判断最有价值的节点"。

mental_model: |
  HITL = 实习生汇报制度
  - 实习生（Agent）自主处理日常事务，无需每步请示
  - 但在两种情况下必须找主管（Human）确认：
    1. 高风险操作："我准备删掉这批历史数据，可以吗？"
    2. 不确定时："这里有两种方案，您倾向于哪种？"
  - 主管确认后，实习生继续执行

  类比：自动驾驶的 L2/L3：
  - L2（HITL）：车辆自动驾驶，但遇到复杂路况（隧道、施工）提醒人类接管
  - L4（无 HITL）：完全自动，不需要人类干预

interrupt_patterns:
  - pattern: "Pre-action Approval（执行前审批）"
    description: "在执行高风险工具调用前暂停，展示'将要执行的操作'，等待人工批准"
    example: |
      Agent："我准备执行以下操作：
      - 删除 /data/old_logs/ 下所有文件（共 1.2GB）
      - 向 100 个用户发送通知邮件
      请确认（Y/N）："
    use_when: "不可逆操作、影响范围大的操作、涉及外部系统的操作"

  - pattern: "Ambiguity Resolution（歧义消解）"
    description: "任务描述不清晰时，暂停并请求澄清，而不是盲目猜测"
    example: |
      Agent："任务目标中的'清理旧数据'是指：
      A. 归档到冷存储
      B. 永久删除
      请选择（A/B）："
    use_when: "任务目标模糊、多种合理解释、选择影响不可逆"

  - pattern: "Milestone Review（里程碑审查）"
    description: "完成重要阶段后暂停，展示阶段成果请人工确认，再继续下一阶段"
    example: "完成数据分析阶段后，展示分析报告摘要，等确认无误后继续生成最终报告"
    use_when: "多阶段任务；后期阶段基于前期阶段的结果，错误会级联放大"

implementation: |
  LangGraph 实现 HITL（interrupt_before）：

  from langgraph.graph import StateGraph
  from langgraph.checkpoint.memory import MemorySaver

  graph = StateGraph(AgentState)
  graph.add_node("agent", run_agent_step)
  graph.add_node("execute_tool", execute_tool)

  # 在执行工具前设置 Interrupt Point
  graph.add_edge("agent", "execute_tool")
  graph.compile(
      checkpointer=MemorySaver(),
      interrupt_before=["execute_tool"]  # ← 执行工具前暂停
  )

  # 运行到 Interrupt Point，自动暂停
  thread = {"configurable": {"thread_id": "task-001"}}
  result = graph.invoke({"task": "清理旧数据"}, thread)
  # result.status == "INTERRUPTED"

  # 展示给人类，等待确认
  print(result.pending_action)  # 展示将要执行的操作
  user_input = input("批准(y)/拒绝(n)/修改(m)?")

  # 根据用户输入决定是否继续
  if user_input == "y":
      graph.invoke(None, thread)  # 继续执行
  else:
      graph.invoke(Command(update={"approved": False}), thread)

design_principles:
  - "明确哪些操作必须 HITL：不可逆操作、影响大范围的操作、涉及外部系统的操作"
  - "Interrupt 展示内容要足够清晰：展示'将要执行什么'，而不只是'请确认'"
  - "提供明确的选项：Y/N、A/B/C，不要让人类猜要怎么回复"
  - "设置超时机制：人类长时间不回复时，默认拒绝（Fail-safe）或升级处理"
  - "记录所有审批记录：谁在什么时间批准了什么操作（合规要求）"

anti_patterns:
  - pattern: "每一步都需要人工确认"
    consequence: "失去自动化价值，人工疲惫（确认疲劳），效率退化为全手动"
  - pattern: "展示模糊的确认信息"
    consequence: "人类无法判断是否应该批准，要么盲目批准（失去 HITL 意义），要么拒绝（阻塞流程）"
  - pattern: "无超时机制"
    consequence: "人类不在线时任务永久阻塞，系统资源被占用"

