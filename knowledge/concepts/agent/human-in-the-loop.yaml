interview_points:
  - "为什么生产级 Agent 需要 Human-in-the-Loop？"
  - "哪些操作必须设置 HITL？设计原则是什么？"
  - "如何避免'确认疲劳'（人类麻木点击确认）？"
  - "LangGraph 中如何实现 HITL？（L2+ 考察代码实现）"
  - "HITL 的审批记录有什么合规意义？（L3+ 考察）"

exam_points:
  - "HITL = 在高风险操作节点暂停，等人工审批后继续"
  - "三种 HITL 模式：Pre-action Approval / Ambiguity Resolution / Milestone Review"
  - "超时 Fail-safe：人类不响应时，默认拒绝而不是默认批准"
  - "必须记录所有审批记录（谁/时间/操作）——合规要求"

one_liner: "HITL = 把人类判断力嵌入 Agent 关键节点，自动化效率和安全可控两者兼得。"
difficulty: advanced
