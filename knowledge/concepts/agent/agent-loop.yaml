  - "AgentState 应该包含哪些字段？为什么要追加而不是覆盖历史？"
  - "为什么生产级 Agent Loop 必须支持 Checkpoint？不支持会有什么问题？"
  - "Context Window 超出时如何处理历史记录？（L2+ 考察）"
  - "如何监控 Agent Loop 的健康状态？（L2+ 考察）"

exam_points:
  - "Agent Loop = ReAct 模式的工程化实现（Thought→Action→Observation→循环）"
  - "终止条件：FINISH / max_iterations / timeout / 连续失败阈值 / 外部中断"
  - "AgentState 贯穿整个 Loop，只追加不修改，支持审计"
  - "Checkpoint：每次迭代后持久化状态，支持断点续跑"

one_liner: "Agent Loop = ReAct 的工程实现，必须有 max_iterations + Checkpoint，否则生产不可用。"
