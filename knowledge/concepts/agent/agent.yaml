interview_points:
  - "Agent 和普通 LLM 调用有什么本质区别？"
  - "Agent 的四大核心组件是什么？各自负责什么？"
  - "什么时候应该用 Agent？什么时候用单次 LLM 调用？"
  - "Multi-Agent 的优势是什么？什么场景适合 Multi-Agent？"
  - "Agent 的安全风险有哪些？如何防御？（L2+ 考察）"
  - "如何设计一个可观测的 Agent 系统？（L2+ 考察）"
  - "Agent 权限设计的最小权限原则怎么落地？（L3+ 考察）"

exam_points:
  - "Agent 三要素：LLM（大脑）+ Tools（手脚）+ Memory（记忆）"
  - "Agent 区别于单次 LLM 调用的核心：自主性 + 工具调用 + 状态持久"
  - "Agent 运行机制 = ReAct Loop（Thought→Action→Observation→循环）"
  - "必须设置 max_iterations + timeout，防止无限循环"
  - "安全原则：最小权限；高风险操作必须 Human-in-the-Loop"

one_liner: "Agent = LLM 大脑 + Tools 手脚 + Memory 记忆，能自主完成多步骤复杂任务的 AI 系统。"
difficulty: intermediate
