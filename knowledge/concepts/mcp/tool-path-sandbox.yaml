interview_points:
  - "为什么给 Agent 的文件读取工具设置路径白名单？不设会有什么风险？"
  - "代码执行工具如何实现沙箱隔离？Docker 方案的优缺点是什么？"
  - "网络请求工具的白名单如何设计？如何处理动态域名需求？"
  - "沙箱的四层防护分别防御哪类攻击？（L3+ 考察纵深防御思维）"

exam_points:
  - "Tool Sandbox 四层：路径控制 / 进程隔离 / 资源限制 / 网络隔离"
  - "路径白名单优于黑名单：黑名单容易遗漏，白名单默认拒绝更安全"
  - "代码执行必须容器隔离：Docker --network=none --read-only --memory=256m"
  - "超时是必须的：防止死循环耗尽资源，建议 30s 以内"

one_liner: "Tool Sandbox = 给工具划定活动范围，即使 Agent 被攻击，最大破坏也被限制在沙箱内。"
difficulty: advanced
