interview_points:
  - "MCP 协议解决了什么问题？为什么需要它？（考察对工具生态碎片化问题的理解）"
  - "MCP 的三类 Primitive（Tool/Resource/Prompt）分别是什么，各自适用什么场景？"
  - "MCP 和 Function Calling 有什么区别？（考察层次理解）"
  - "如何设计一个安全的 MCP Server？需要考虑哪些安全点？"
  - "MCP Server 的 Tool description 为什么对 LLM 行为影响很大？（L2+ 考察）"

exam_points:
  - "MCP = 开放协议，标准化 LLM 应用与外部工具的通信方式，解决生态碎片化"
  - "三类 Primitive：Tool（执行操作）/ Resource（读取数据）/ Prompt（模板复用）"
  - "传输方式：stdio（本地）/ HTTP+SSE（网络）"
  - "MCP 类比 USB：Server = 设备，Client = 主机，协议 = USB 规范"
  - "安全要点：权限控制 + 输入验证 + 超时限制 + 沙箱隔离"

one_liner: "MCP = AI 工具世界的 USB 接口，写一次 Server，所有兼容框架都能用。"
