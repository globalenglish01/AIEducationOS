summary: "MCP 采用 Client-Server 架构：LLM 应用作为 Client，外部能力提供方作为 Server，通过标准协议通信，实现工具能力的解耦和复用。"

definition: |
  MCP 架构由三个角色组成：
  - MCP Host：运行 LLM 应用的环境（如 Claude Desktop、自研 Agent 系统）
  - MCP Client：嵌入 Host 中的协议客户端，负责与 Server 通信
  - MCP Server：独立进程或服务，暴露 Tool/Resource/Prompt 能力

  一个 Host 可以同时连接多个 MCP Server（如：搜索 Server + 数据库 Server + 文件 Server），
  LLM 通过 Client 获取所有 Server 的能力清单，在推理时按需调用。

why: |
  传统 AI 应用的工具是硬编码在应用内的，每次新增工具都要修改核心代码。
  MCP Server/Client 架构实现了能力的插件化：
  - 新增工具：部署新的 MCP Server，无需修改 Host 应用
  - 工具复用：同一个 MCP Server（如 GitHub 工具）可被多个不同 Host 使用
  - 权限隔离：每个 Server 独立进程，一个 Server 崩溃不影响其他 Server

mental_model: |
  MCP 架构 = 浏览器插件系统
  - 浏览器（MCP Host）：提供基础运行环境
  - 插件管理器（MCP Client）：管理已安装的插件，转发请求
  - 浏览器插件（MCP Server）：独立提供某种能力（广告拦截/密码管理/翻译）
  你可以安装任意多个插件，每个插件互相独立，浏览器通过统一接口与插件通信。

