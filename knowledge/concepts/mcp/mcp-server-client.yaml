transport_modes:
  - mode: "stdio（标准输入输出）"
    description: "Host 通过子进程启动 Server，通过 stdin/stdout 通信"
    use_when: "本地工具，Server 和 Host 在同一台机器"
    pros: "简单、低延迟、无需网络配置"
    cons: "只能本地使用，无法跨机器部署"

  - mode: "HTTP + SSE（Server-Sent Events）"
    description: "Server 作为独立 HTTP 服务运行，Client 通过 HTTP 连接"
    use_when: "远程工具、云服务、需要跨机器共享的工具"
    pros: "可远程部署、支持多 Client 同时连接"
    cons: "需要网络配置，延迟相对高"

implementation: |
  # MCP Server 实现（Python，stdio 传输）
  from mcp.server.fastmcp import FastMCP

  mcp = FastMCP("database-tools")

  @mcp.tool()
  def query_users(filter_by: str = "") -> list[dict]:
      """
      查询用户数据库。当需要获取用户信息时使用。
      参数 filter_by: 过滤条件，如 'active' 或 'premium'，空字符串返回所有用户
      """
      conn = get_db_connection()
      return conn.execute(f"SELECT * FROM users WHERE status=?", [filter_by]).fetchall()

  @mcp.resource("db://schema")
  def get_schema() -> str:
      """返回数据库表结构"""
      return DATABASE_SCHEMA

  if __name__ == "__main__":
      mcp.run()  # 默认使用 stdio 传输

  # ---
  # MCP Client 配置（claude_desktop_config.json 示例）
  {
    "mcpServers": {
      "database": {
        "command": "python",
        "args": ["./mcp_servers/database_server.py"]
      },
      "search": {
        "command": "npx",
        "args": ["-y", "@modelcontextprotocol/server-brave-search"],
        "env": {"BRAVE_API_KEY": "..."}
      }
    }
  }

best_practices:
  - "每个 MCP Server 单一职责：数据库工具 / 搜索工具 / 文件工具分开部署"
  - "Server 启动时做健康检查：工具依赖（数据库连接、API Key）不可用时快速失败"
  - "记录所有工具调用日志：工具名 + 参数 + 返回值摘要 + 耗时，供审计和调试"
  - "Server 版本化管理：工具接口变更要做版本兼容，避免 Client 无感升级后出错"

anti_patterns:
  - pattern: "所有工具挤在一个 MCP Server 里"
    consequence: "Server 职责不清、维护困难；一个工具崩溃影响所有工具"
  - pattern: "MCP Server 不做权限验证，信任所有 Client 调用"
    consequence: "任何能连接到 Server 的程序都能执行所有工具，安全边界消失"

