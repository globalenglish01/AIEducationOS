      note: "Guardrails 在输出层拦截工具注入导致的危险行为"

interview_points:
  - "Tool Injection 和 Prompt Injection 有什么联系和区别？"
  - "工具返回值为什么可以成为注入攻击的载体？如何防御？"
  - "如何验证 MCP Server 的可信度？（L2+ 考察供应链安全意识）"
  - "为什么说工具参数校验应该在工具内部实现，而不能只依赖 LLM？（L3+ 考察）"

exam_points:
  - "Tool Injection 三种形式：返回值注入 / MCP Server 劫持 / 参数污染"
  - "核心防御：工具返回值标记不可信 + MCP Server 来源白名单 + 工具内部参数校验"
  - "不能依赖 LLM 做安全判断：LLM 的判断本身可被影响，安全校验必须在确定性代码中实现"
  - "高危工具（写入/执行/网络）必须加 Human-in-the-Loop"

one_liner: "Tool Injection = 通过工具的输入/输出/描述向 Agent 注入恶意指令，是 Prompt Injection 在工具链的延伸。"
difficulty: advanced
