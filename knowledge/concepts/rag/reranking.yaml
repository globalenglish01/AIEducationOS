interview_points:
  - "Reranking 解决了向量检索的什么问题？"
  - "双编码器（向量检索）和交叉编码器（Reranker）的区别？"
  - "两阶段检索的设计原则是什么？Top-N 和 Top-K 如何选择？"
  - "Reranker 会增加多少延迟？在什么场景下值得使用？"

exam_points:
  - "Reranking = 两阶段检索：粗检索 Top-N（快）→ Reranker 精排 Top-K（准）"
  - "Reranker = 交叉编码器，同时看 Query+Doc，精度高但速度慢"
  - "典型配置：粗检索 Top-50，Reranker 精选 Top-5 注入 Prompt"
  - "实验效果：Reranking 可提升 RAG 最终质量 10-30%"

one_liner: "Reranking = 先快速海选，再精准面试——两阶段检索让 RAG 兼顾速度和精度。"
difficulty: advanced
