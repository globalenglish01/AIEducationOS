exam_points:
  - "向量数据库核心能力：毫秒级相似向量检索（ANN）"
  - "HNSW：主流 ANN 算法，O(log N) 复杂度，精度损失极小"
  - "选型简则：开发用 Chroma，生产用 Qdrant，快速上线用 Pinecone"
  - "必须同时存向量 + 原始文本 + 元数据，元数据支持过滤条件"

one_liner: "向量数据库 = 语义搜索引擎，毫秒内在百万向量中找最相似的 K 个——RAG 的核心存储组件。"
