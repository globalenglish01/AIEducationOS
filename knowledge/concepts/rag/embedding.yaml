interview_points:
  - "Embedding 是什么？它解决了什么问题（相比关键词搜索）？"
  - "余弦相似度是什么？如何用它判断两段文字的语义相似度？"
  - "选择 Embedding 模型时要考虑哪些因素？"
  - "为什么同一个系统里不能混用不同的 Embedding 模型？"
  - "Embedding 缓存有什么意义？（L2+ 成本优化）"

exam_points:
  - "Embedding = 文本 → 固定维度浮点向量，语义相近的文本向量距离近"
  - "核心度量：余弦相似度（Cosine Similarity），范围 [-1,1]，越接近 1 越相似"
  - "同一系统必须用同一个 Embedding 模型，不同模型向量空间不兼容"
  - "Embedding 结果可以缓存（同文本→同向量），避免重复 API 调用"

one_liner: "Embedding = 给文字分配语义坐标，让计算机能计算'语义距离'——RAG 的数学基础。"
difficulty: intermediate
