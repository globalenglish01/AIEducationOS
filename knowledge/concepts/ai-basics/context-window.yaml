common_misconceptions:
  - misconception: "LLM 能记住所有历史对话"
    correction: "LLM 没有持久记忆。每次请求独立，只能看到当前 Context Window 内的内容。超出的历史会被截断或遗忘。"
  - misconception: "Context Window 越大，系统设计就越简单"
    correction: "大 Context Window 带来'Lost in the Middle'问题：关键信息放在中间部分时，LLM 容易忽略。同时成本也更高。"
  - misconception: "Context Window 只是输入的大小"
    correction: "Context Window = 输入 Token + 输出 Token 的总和。输出越长，留给输入的空间越少。"

best_practices:
  - "将最重要的信息放在 Context 的开头或结尾（LLM 对首尾内容注意力更强）"
  - "设计 Context 预算：System Prompt + Examples + RAG Results + History + User Input 各自分配 Token 上限"
  - "对长对话实现历史压缩（摘要化早期历史）"
  - "RAG 检索结果按相关性排序，最相关的放在靠近问题的位置"

anti_patterns:
  - pattern: "不限制历史对话长度，让它无限增长"
    consequence: "Context Window 溢出，早期历史被截断，LLM '忘记'重要信息；成本随对话轮数线性增长"
  - pattern: "把所有可能相关的文档都塞进 Context"
    consequence: "关键信息被噪音淹没（Lost in the Middle），输出质量下降，成本飙升"

interview_points:
  - "Context Window 是什么？它对多轮对话系统设计有什么影响？"
  - "什么是'Lost in the Middle'问题？如何缓解？"
  - "如何设计 Context 预算，让有限的 Context Window 发挥最大价值？"
  - "Context Window 和 LLM 记忆的关系是什么？如何实现长期记忆？"
  - "128K Context Window 能放多少中文内容？（约8-9万字）"

exam_points:
  - "Context Window = 输入Token + 输出Token，共享上限"
  - "LLM 没有持久记忆，每次请求独立，只能看到当前 Context 内容"
  - "Lost in the Middle：关键信息在中间时 LLM 注意力下降"
  - "解决长对话的方法：历史摘要压缩、外部记忆存储（Long-term Memory）"
  - "128K Token ≈ 8-9万中文字，≈ 10万英文字"

one_liner: "Context Window 是 LLM 的桌面大小——桌面外的资料它看不见，设计系统时必须精打细算。"
difficulty: beginner

references:
