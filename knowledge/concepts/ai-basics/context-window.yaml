aliases:
  - "上下文窗口"
  - "Context Length"
  - "上下文长度"

summary: "LLM 每次请求能看到的最大 Token 数量，是它的'工作记忆'边界，直接影响系统设计。"

definition: |
  Context Window（上下文窗口）是 LLM 在单次推理中能处理的最大 Token 数量。
  它同时包含输入（Prompt + 历史对话 + 检索内容）和输出（生成的回答）。
  超出 Context Window 的内容会被截断，LLM 完全无法访问。
  典型大小：GPT-3.5 = 16K，GPT-4o = 128K，Claude 3.5 = 200K，Gemini 1.5 = 1M。

why: |
  LLM 没有持久记忆。每次请求都是全新的——它唯一能"记住"的，
  就是当前 Context Window 里的内容。
  Context Window 的大小决定了：能处理多长的文档、能记住多长的对话历史、
  能注入多少外部知识（RAG 检索结果）。
  这是 AI 系统设计中最重要的物理约束之一。

mental_model: |
  Context Window = 考试时桌面的大小（开卷考试）
  - 桌面只有这么大，能摊开的参考资料就这么多
  - 超出桌面的资料必须收起来，考试时看不到
  - 桌面越大，能参考的资料越多，回答越准确
  - 但桌面太大也有问题：找关键信息变慢（注意力分散）

how_it_works: |
  一次 LLM 请求的 Context Window 组成：
  ┌─────────────────────────────────────────┐
  │  System Prompt（角色定义、规则）          │
  │  Few-shot Examples（示例）               │
  │  Retrieved Docs（RAG 检索结果）           │
  │  Conversation History（历史对话）         │
  │  Current User Message（当前输入）         │
  │  ─────────────────────────────────────  │
  │  [Generated Response]（输出占用）         │
  └─────────────────────────────────────────┘
  所有部分加起来不能超过 Context Window 上限。

core_principles:
  - "Context Window 是 LLM 唯一的'记忆'——不在窗口内就等于不存在"
  - "输入 + 输出共享同一个 Context Window，输出越长，留给输入的空间越少"
  - "Context Window 越大不一定越好：大窗口中信息密度低，关键内容可能被淹没（Lost in the Middle 问题）"
  - "Context Window 大小影响成本：处理的Token越多，费用越高"

examples:
  - scenario: "长文档问答"
    description: "200K Context Window 的 Claude 可以直接放入一本书，然后问任何关于书的问题"
  - scenario: "多轮对话"
    description: "对话历史随轮次增长，需要设计'历史压缩'策略，避免撑爆 Context Window"
  - scenario: "RAG 注入"
    description: "检索到5个文档片段各500Token，加上其他Prompt共用Context Window，需要精确规划空间"

counter_examples:
  - "不要以为 Context Window 越大就万事大吉——关键信息放在中间可能被忽略（Lost in the Middle）"
  - "不要不管不顾地堆内容——每个Token都有成本，多余的内容只会浪费钱并干扰输出"

