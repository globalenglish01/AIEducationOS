aliases:
  - "Large Language Model"
  - "大语言模型"
  - "基础模型"
  - "Foundation Model"

summary: "用海量文本训练出来的 AI 模型，能理解并生成人类语言，是 AI Native 工程的基础组件。"

definition: |
  Large Language Model（大语言模型，LLM）是一种基于 Transformer 架构，
  在数千亿规模文本数据上预训练的神经网络模型。
  它能够理解输入文本（Prompt），并以概率方式逐 Token 生成输出文本。
  典型代表：GPT-4、Claude、DeepSeek、Llama。

why: |
  在 LLM 出现之前，让计算机理解自然语言需要人工定义规则，
  或者用小模型完成极其有限的任务（如分类、命名实体识别）。
  LLM 的出现使得一个模型可以完成翻译、写代码、回答问题、推理等几乎所有语言任务，
  成为 AI 应用的通用基础组件——就像操作系统之于软件工程。

mental_model: |
  LLM = 一个"接龙高手"
  它本质上只做一件事：给定前面的文字，预测下一个最可能出现的词（Token）。
  但因为训练数据极其丰富，它"见过"几乎所有人类知识，
  所以它的"接龙"看起来像理解、推理、创作。

  类比：一个读过所有书的人，被要求"接着说"——
  他不是真的在思考，而是在凭借极其丰富的阅读经验做出最合理的预测。

history: |
  2017年：Google 提出 Transformer 架构（"Attention Is All You Need"）
  2018年：OpenAI 发布 GPT-1，BERT 出现，预训练模型时代开始
  2020年：GPT-3（1750亿参数）展现涌现能力，引发业界震动
  2022年：ChatGPT 发布，LLM 进入大众视野
  2023年：GPT-4、Claude、Llama 2 相继发布，开源 + 闭源生态并行
  2024年：DeepSeek、Qwen 等中国模型崛起，多模态成为标配
  2025年：推理模型（o1/R1）出现，LLM 开始具备深度推理能力

problem_it_solves: |
  1. 语言理解的通用性：一个模型解决所有语言任务，不再需要为每个任务单独训练
  2. 知识获取的成本：无需人工标注规则，从数据中自动学习
  3. 自然交互界面：用自然语言代替编程接口，降低 AI 使用门槛
  4. 跨领域泛化：同一模型能写诗、写代码、解数学题、做法律分析

how_it_works: |
  1. 输入处理：将文本切分为 Token（词片段）
  2. 编码：将每个 Token 转为向量（Embedding）
  3. 注意力计算：Transformer 的 Self-Attention 让每个 Token 关注其他所有 Token
  4. 多层叠加：数十到数百层 Transformer Block 逐层提取语义
  5. 输出：对词表中每个 Token 计算概率，采样得到下一个 Token
  6. 重复步骤5，直到生成结束标记

core_principles:
  - "LLM 是概率模型，不是确定性程序：同样的输入，每次输出可能不同"
  - "LLM 没有理解，只有统计模式：它预测'什么词最可能出现'，而非'理解意思'"
  - "规模带来涌现：参数量超过某个阈值，能力会突然跃升（涌现现象）"
  - "上下文窗口是记忆边界：LLM 只能看到 Context Window 内的内容"

examples:
  - scenario: "代码生成"
    description: "给定需求描述，LLM 生成对应 Python 代码"
  - scenario: "文档问答"
    description: "给定文档内容 + 问题，LLM 基于文档回答（RAG 的核心）"
  - scenario: "任务规划"
    description: "给定复杂任务，LLM 将其拆解为可执行步骤（Agent Planning）"

counter_examples:
  - "LLM 不适合需要精确计算的场景（如财务计算），应使用代码工具"
  - "LLM 不适合需要实时数据的场景（如股票价格），应结合 RAG 或 Tool"
  - "LLM 不适合确定性业务逻辑（如税率计算规则），规则引擎更可靠"

