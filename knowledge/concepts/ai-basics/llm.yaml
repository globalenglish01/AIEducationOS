common_misconceptions:
  - misconception: "LLM 是在'思考'或'理解'"
    correction: "LLM 是在做统计预测——预测下一个最可能的 Token。它的输出看起来像理解，是因为训练数据极其丰富，而非真正具备推理能力。"
  - misconception: "LLM 记得所有对话历史"
    correction: "LLM 只能看到当前请求中 Context Window 内的内容。超出窗口的内容会被截断，LLM 完全'忘记'。"
  - misconception: "更大的模型一定更好"
    correction: "在具体任务上，小模型 + 好的 Prompt/RAG 可能胜过大模型。成本、延迟、隐私也是选型的关键因素。"
  - misconception: "LLM 输出的内容一定是事实"
    correction: "LLM 会自信地生成错误内容（幻觉），必须通过 RAG、Evaluation、人工审核等手段控制质量。"

best_practices:
  - "始终将 LLM 视为概率组件，而非确定性函数——设计 Evaluation 来持续监控输出质量"
  - "对关键业务场景设置 Human-in-the-Loop，不要让 LLM 直接驱动不可逆操作"
  - "选型时考虑：能力、成本、延迟、隐私、数据主权——没有万能最优解"
  - "Temperature=0 用于调试（可复现）；生产环境根据任务类型调整"

anti_patterns:
  - pattern: "把 LLM 当数据库用（问它具体事实）"
    consequence: "高幻觉率，输出不可信。应使用 RAG 或结构化数据源"
  - pattern: "不做 Evaluation 直接上生产"
    consequence: "质量问题累积到用户投诉才发现，无法量化改进效果"
  - pattern: "用同一个大模型处理所有任务"
    consequence: "成本浪费。简单分类用小模型，复杂推理用大模型"

real_world_cases:
  - description: "GitHub Copilot 用 LLM 实现代码补全，开发效率提升 55%"
    company: "GitHub / Microsoft"
  - description: "客服系统接入 LLM，首次响应率提升 40%，人工介入减少 60%"
    company: "典型 SaaS 企业"

interview_points:
  - "LLM 的本质是什么？它如何生成文本？（考察：能否解释 Token 预测机制）"
  - "LLM 为什么会产生幻觉？如何缓解？（考察：对 LLM 局限性的理解）"
  - "Context Window 是什么？它对系统设计有什么影响？"
  - "Temperature 参数的作用是什么？生产环境中如何设置？"
  - "什么场景适合用 LLM，什么场景不适合？给出判断框架"
  - "大模型和小模型如何选型？考虑哪些因素？"

exam_points:
  - "LLM 生成文本的方式：逐 Token 预测，基于概率分布采样"
  - "Context Window 的限制：超出窗口的内容被截断，LLM 无法访问"
  - "Temperature=0：确定性输出（总选最高概率）；Temperature 越高：输出越随机"
  - "LLM 不适合的场景：精确计算、实时数据、确定性规则"
  - "涌现现象：模型规模超过阈值后，能力突然跃升（非线性增长）"

one_liner: "LLM = 读过所有书的接龙高手，概率预测下一个词，不是真的在思考。"
difficulty: beginner

