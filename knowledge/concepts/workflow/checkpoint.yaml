  - "为什么生产级 Agent 必须有 Checkpoint？不做会有什么后果？"
  - "LangGraph 的 Checkpoint 和 Resume 如何工作？thread_id 的作用是什么？"
  - "Checkpoint 存储方案有哪些？生产环境应该用哪个？"
  - "如何设计 thread_id 来支持多用户、多租户场景？（L3+ 考察）"

exam_points:
  - "Checkpoint = 持久化 Agent 执行状态，支持断点续跑"
  - "Resume：用同一个 thread_id 重新 invoke，LangGraph 自动从最近 Checkpoint 恢复"
  - "生产存储：SqliteSaver（单机）/ PostgresSaver（分布式）"
  - "thread_id 必须唯一标识一个任务，多用户场景必须隔离"

one_liner: "Checkpoint = 游戏存档机制，Agent 中断后从断点继续而不是从头来——生产可靠性的基础。"
difficulty: advanced
