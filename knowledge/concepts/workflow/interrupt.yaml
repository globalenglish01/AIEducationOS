id: "KN-C-000028"
type: Pattern
name: "Interrupt（中断与恢复）"
version: "1.0"
last_updated: "2026-06-19"
status: active
level: "L2-L3"
tags:
  - workflow
  - interrupt
  - human-in-the-loop
