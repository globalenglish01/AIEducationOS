interview_points:
  - "多租户架构需要在哪些维度做隔离？（数据/权限/计费/资源各说一点）"
  - "为什么 tenant_id 不能从请求参数读取，必须从 JWT Token 提取？"
  - "向量数据库如何实现多租户隔离？（L2+ 考察实现细节）"
  - "一个高用量租户如何避免影响其他租户？（L3+ 考察资源隔离）"

exam_points:
  - "四维隔离：数据（tenant_id 过滤）/ 权限（JWT role）/ 计费（独立统计）/ 资源（速率限制）"
  - "tenant_id 必须来自 JWT，不接受客户端传入"
  - "向量检索也要附带 tenant_id 过滤，否则语义相似查询可能返回其他租户数据"
  - "权限判断必须在确定性代码中，不能依赖 LLM"

one_liner: "多租户 = 写字楼分层管理：同一套 AI 基础设施，多个客户完全隔离使用，数据不混、账单独立、资源公平。"
difficulty: advanced
