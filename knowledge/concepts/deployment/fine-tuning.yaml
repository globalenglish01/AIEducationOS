  - "LoRA 是什么？为什么它比全量微调更实用？"
  - "Fine-tuning 数据质量为什么比数量更重要？"
  - "如何评估 Fine-tuning 的效果？需要防范什么问题？（L3+ 考察）"

exam_points:
  - "Fine-tuning 适合：固定格式 / 特定风格 / 保密知识 / 高推理速度"
  - "RAG 适合：频繁更新的知识 / 需要溯源 / 快速落地"
  - "LoRA：冻结原始权重，插入低秩矩阵（A×B），参数量减少 100x+"
  - "数据质量第一：100 条精品 > 10000 条劣质"

one_liner: "Fine-tuning = 岗前专项培训，让模型'本能'输出特定格式或风格，省掉每次带说明书（few-shot）的成本。"
difficulty: advanced
