interview_points:
  - "LLM API 超时后你会怎么处理？描述完整的降级链路。"
  - "429 速率限制和 LLM 超时，降级策略有什么不同？"
  - "RAG 服务不可用时，如何保证 AI 应用不完全崩溃？"
  - "降级时应该向用户展示什么信息？为什么不能沉默失败？（L3+ 考察）"

exam_points:
  - "四级降级：透明切换 → 有限功能 → 静态响应 → 服务通知"
  - "必须设置 timeout：LLM 调用建议 30s，工具调用建议 10s"
  - "降级要告知用户：沉默失败比显式降级更难排查"
  - "降级方案不能依赖故障组件：否则降级本身也会失败"

one_liner: "Graceful Degradation = AI 系统的'应急预案'，LLM 挂了有备用、超时了有降级、格式错了有兜底，系统永远不完全崩溃。"
difficulty: intermediate
