id: "KN-C-000073"
type: Practice
name: "Graceful Degradation（优雅降级）"
version: "1.0"
last_updated: "2026-06-20"
status: active
level: "L2-L3"
tags:
  - deployment
  - reliability
  - resilience
  - fallback

aliases:
  - "优雅降级"
  - "降级策略"
  - "Fallback Strategy"

summary: "AI 系统在遇到 LLM 不可用、超时、限流等故障时，自动切换到降级方案继续提供有限服务，而非直接报错崩溃。"

definition: |
  Graceful Degradation 是 AI 系统的故障弹性设计原则：
  当系统的某个组件（LLM API、RAG 检索、工具调用）出现故障时，
  不是直接返回错误，而是：
  1. 检测到故障
  2. 切换到预先设计的降级方案（Fallback）
  3. 提供有限但仍然有用的服务
  4. 向用户或监控系统说明当前处于降级状态

why: |
  AI 系统依赖的外部服务（LLM API、向量数据库、搜索引擎）不是 100% 可用的：
  - LLM API 超时（OpenAI P99 延迟有时超过 30s）
  - 429 速率限制（高并发时必然遇到）
  - RAG 检索服务宕机
  - 网络抖动
  没有 Graceful Degradation 的系统，任何一个依赖组件故障都会导致全线崩溃。
  有了降级策略，单点故障只影响部分功能，系统整体继续运行。

mental_model: |
  Graceful Degradation = 飞机失去一个引擎
  - 四引擎飞机失去一个引擎，不会坠机
  - 飞行员切换到三引擎模式（降级），继续飞行（能力下降但仍可用）
  - 告知乘客（用户）当前状态，并寻找最近机场降落（恢复全功能）

  对比暴力崩溃：
  - 四引擎飞机失去一个引擎 → 直接坠机（完全不可用）
  这在航空中不可接受，在 AI 系统中同样不可接受。

degradation_scenarios:
  - scenario: "LLM API 超时（> 30s）"
    detection: "设置 timeout=30s，捕获 TimeoutError"
    fallback:
      - "重试一次（延迟 2s）"
      - "切换到备用模型（如从 GPT-4o 切到 Claude Haiku）"
      - "返回缓存的上一次相似问题的答案"
      - "返回友好提示：'AI 响应较慢，请稍后重试'"
    code: |
      import asyncio
      from tenacity import retry, stop_after_attempt, wait_exponential

      @retry(stop=stop_after_attempt(2), wait=wait_exponential(min=1, max=4))
      async def call_llm_with_fallback(messages: list[dict]) -> str:
          try:
              return await primary_llm.chat(messages, timeout=30)
          except asyncio.TimeoutError:
              # 降级：切换到更快的小模型
              return await fallback_llm.chat(messages, timeout=15)

  - scenario: "429 速率限制"
    detection: "捕获 RateLimitError"
    fallback:
      - "指数退避重试（1s, 2s, 4s, 8s）"
      - "切换到备用账号/API Key"
      - "将请求加入队列，延迟处理"
    code: |
      import time

      def call_with_rate_limit_handling(messages, accounts: list):
          for i, account in enumerate(accounts):
              try:
                  return llm.chat(messages, api_key=account.key)
              except RateLimitError:
                  if i == len(accounts) - 1:
                      raise  # 所有账号都限流，真的需要等待
                  time.sleep(2 ** i)  # 指数退避

  - scenario: "RAG 检索服务不可用"
    detection: "捕获连接异常或超时"
    fallback:
      - "跳过 RAG，直接用 LLM 内置知识回答（标注'答案基于训练知识，可能不够准确'）"
      - "使用本地缓存的热门 RAG 结果"
    code: |
      def rag_with_fallback(query: str) -> str:
          try:
              context = vector_db.search(query, timeout=5)
              return llm.chat(build_rag_prompt(query, context))
          except Exception as e:
              logger.warning(f"RAG 检索失败，降级为直接回答: {e}")
              # 降级：不使用 RAG，直接回答，并告知用户
              return llm.chat([
                  {"role": "system", "content": "当前知识库不可用，请基于训练知识回答，并在回答末尾说明'（注：当前使用通用知识，非最新信息）'"},
                  {"role": "user", "content": query}
              ])

  - scenario: "LLM 返回非法 JSON（格式错误）"
    detection: "json.JSONDecodeError"
    fallback:
      - "重试一次，并在 Prompt 中加强格式要求"
      - "用正则从输出中提取关键字段"
      - "返回默认值或空结构"
    code: |
      import json, re

      def parse_llm_json_output(raw_output: str, default: dict = None) -> dict:
          try:
              return json.loads(raw_output)
          except json.JSONDecodeError:
              # 尝试用正则提取 JSON 部分
              match = re.search(r'\{.*\}', raw_output, re.DOTALL)
              if match:
                  try:
                      return json.loads(match.group())
                  except json.JSONDecodeError:
                      pass
              return default or {}

degradation_levels:
  - level: "L1 - 透明降级"
    description: "切换到备用模型/账号，用户无感知，质量略降"
  - level: "L2 - 有限功能降级"
    description: "部分功能不可用（如 RAG 失效），核心功能仍然提供"
  - level: "L3 - 静态响应降级"
    description: "返回预设的静态答案或缓存内容"
  - level: "L4 - 服务降级通知"
    description: "所有 AI 功能不可用，返回明确的降级提示，引导用户稍后重试"

best_practices:
  - "每个外部依赖都要有降级方案：LLM API / RAG / 工具调用全部覆盖"
  - "降级时记录日志和告警：降级是异常信号，需要人工关注"
  - "降级不等于沉默失败：要向用户说明当前服务状态"
  - "定期演练降级：Chaos Engineering 验证降级策略真正有效"

anti_patterns:
  - pattern: "没有 timeout，等待 LLM 响应直到连接超时（默认几分钟）"
    consequence: "用户等待数分钟，连接池资源被占用，整个系统并发能力下降"
  - pattern: "降级方案也依赖同一个故障组件"
    consequence: "降级失败，比没有降级更糟糕（额外延迟后还是报错）"
  - pattern: "永远不触发降级，等到彻底崩溃才处理"
    consequence: "雪崩效应：一个组件故障导致整个系统不可用"

