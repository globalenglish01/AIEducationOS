interview_points:
  - "Chaos Engineering 在 AI 系统中为什么特别重要？和传统软件有什么不同？"
  - "列举 5 个 AI 系统特有的混沌测试场景。"
  - "如何验证降级策略真正有效？描述一次完整的混沌演练流程。"
  - "混沌测试如何融入 CI/CD 流水线？（L3+ 考察）"

exam_points:
  - "Chaos Engineering = 主动制造故障，在测试环境验证降级策略，而非等生产故障"
  - "AI 特有故障场景：LLM 超时 / 429 限流 / 非法 JSON / Agent 循环 / Token 耗尽"
  - "演练五步：定义稳态 → 假设 → 注入故障 → 观察 → 修复并重复"
  - "必须输出演练报告：场景 × 预期 × 实际 × 差距"

one_liner: "Chaos Engineering = 主动给 AI 系统制造故障的消防演练，验证降级策略真正有效，而非'理论上应该能降级'。"
difficulty: advanced
