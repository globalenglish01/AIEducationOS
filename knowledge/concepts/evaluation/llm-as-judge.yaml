  - "核心前提：Judge 能力 > 被评估系统"
  - "三大偏差：自我偏好 / 位置偏好 / 长度偏好"
  - "Judge Prompt 必须：结构化输出 + 明确评分标准 + 要求评分理由"

one_liner: "LLM-as-Judge = 用强 LLM 当主编审稿，秒级评估 AI 输出质量——AI 系统质量控制的核心手段。"
difficulty: advanced
