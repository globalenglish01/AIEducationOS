interview_points:
  - "为什么 AI 系统需要 Eval Dataset？没有它会有什么问题？"
  - "Eval Dataset 的构建策略有哪些？各自有什么优劣？"
  - "Eval Dataset 的质量标准有哪些？"
  - "如何将 Eval Dataset 集成到开发工作流？（L2+ 考察）"
  - "如何确保 Eval Dataset 不过时？（L3+ 考察）"

exam_points:
  - "Eval Dataset = AI 系统的单元测试套件，每次变更后运行，确保质量没有退化"
  - "构建策略：用户数据采样 / 场景驱动人工设计 / LLM 生成+人工校验"
  - "质量标准：代表性 / 多样性 / 挑战性 / 准确性 / 时效性"
  - "必须版本控制（存 Git），质量 > 数量"

one_liner: "Eval Dataset = AI 的单元测试集，没有它就没有可靠的质量保证——每次系统变更后都要跑一遍。"
difficulty: intermediate
