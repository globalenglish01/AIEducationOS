interview_points:
  - "当 Agent 的对话历史超出 Context Window 上限时，你会怎么处理？"
  - "摘要压缩 vs 滑动窗口，各自的适用场景和缺点是什么？"
  - "压缩触发时机如何设计？为什么不能等到满了再压缩？"
  - "如何保证压缩后的上下文不丢失关键信息？（L3+ 考察）"

exam_points:
  - "Context Compression 三策略：滑动窗口 / 摘要压缩 / 重要性过滤"
  - "System Prompt 永远不压缩，它是 Agent 行为的基础"
  - "压缩触发点：Context Window 80% 时触发，而非等到溢出"
  - "摘要压缩需要额外一次 LLM 调用，会增加延迟和成本（但节省后续调用成本）"

one_liner: "Context Compression = 把长对话历史'浓缩成会议纪要'，在 token 预算内保留最多有效信息。"
difficulty: intermediate
