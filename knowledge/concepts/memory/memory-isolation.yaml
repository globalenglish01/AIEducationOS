interview_points:
  - "如何确保多用户 AI 应用中用户A无法读取用户B的记忆？"
  - "user_id 为什么必须来自认证系统，而不能来自用户请求参数？"
  - "LangGraph 如何通过 thread_id 实现会话级隔离？"
  - "如果长期记忆搜索没有 user_id 过滤，会导致什么安全问题？（L3+ 考察 IDOR）"

exam_points:
  - "三级隔离：会话级（thread_id）/ 用户级（user_id 过滤）/ 项目级（tenant_id）"
  - "user_id 必须来自 JWT token，不能接受客户端传入（防 IDOR）"
  - "记忆搜索必须强制附带 user_id 过滤，禁止全局搜索"
  - "IDOR 漏洞：越权访问其他用户数据，违反记忆隔离是典型场景"

one_liner: "记忆隔离 = 每个用户的记忆空间严格按 user_id 分区，任何跨用户查询都是安全漏洞。"
difficulty: intermediate
