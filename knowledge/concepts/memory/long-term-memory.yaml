interview_points:
  - "短期记忆和长期记忆的根本区别是什么？分别存在哪里？"
  - "Agent 长期记忆的三种类型（情景/语义/程序性）分别适合存什么？"
  - "长期记忆在多用户场景下如何做隔离？不做隔离会有什么安全风险？"
  - "如何决定什么内容值得写入长期记忆，什么内容只用短期记忆？（L2+ 考察）"

exam_points:
  - "长期记忆 = 外部持久化存储，跨会话保留，通过检索按需加载"
  - "三类长期记忆：情景记忆（具体事件）/ 语义记忆（抽象知识）/ 程序性记忆（操作步骤）"
  - "必须按 user_id 隔离：否则是 IDOR 漏洞"
  - "存储前提炼，检索时按需加载：不能全量存储，也不能全量注入"

one_liner: "长期记忆 = 把重要信息写入外部存储，下次对话通过检索'想起来'，跨越 Context Window 的会话遗忘。"
difficulty: intermediate
