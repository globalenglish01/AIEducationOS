interview_points:
  - "Agent 的短期记忆是如何实现的？为什么说 LLM 本身是无状态的？"
  - "Context Window 满了怎么办？有哪些裁剪策略，各有什么 Trade-off？"
  - "短期记忆和长期记忆的根本区别是什么？"
  - "如何在不丢失关键信息的前提下压缩上下文？（L2+ 考察）"

exam_points:
  - "短期记忆 = Context Window 内的消息历史，会话结束自动消失"
  - "LLM 无状态：每次 API 调用独立，通过拼接历史消息模拟记忆"
  - "上下文管理三策略：滑动窗口 / 摘要压缩 / 重要性过滤"
  - "裁剪时必须保留 System Prompt，否则 LLM 失去约束"

one_liner: "短期记忆 = 把对话历史拼进 Prompt，让无状态的 LLM 看起来'记住了'之前说的话。"
difficulty: beginner
