  - "列举3个 LLM/Agent 系统特有的故障场景，并描述期望的系统行为"
  - "如何测试 Agent 的 max_iterations 保护机制是否正常工作？"
  - "Chaos Engineering 应该在什么环境进行？（L3+ 考察风险控制）"

exam_points:
  - "Chaos Engineering = 主动注入故障验证系统韧性，先于用户发现故障"
  - "9个 AI 特有场景：API超时/限流/无效JSON/工具崩溃/DB连接耗尽/Token配额/用户断线/并发激增/Agent无限循环"
  - "流程：稳态 → 假设 → 注入 → 观察 → 验证 → 修复"
  - "Agent 无限循环测试：验证 max_iterations 触发 + 部分结果返回 + 日志记录"

one_liner: "混沌工程 = 主动打自己，在测试环境注入故障，验证 AI 系统在真实故障面前能否扛住——而不是等线上炸了再知道。"
