interview_points:
  - "Fine-tuning 和 RAG 的区别是什么？什么场景下用哪个？"
  - "LoRA 的原理是什么？为什么它比全量微调更实用？"
  - "Fine-tuning 的数据集应该如何准备？数量和质量哪个更重要？"
  - "什么是灾难性遗忘？如何缓解？"
  - "Fine-tuning 后如何评估效果？（L3+ 考察）"
  - "Fine-tuning + RAG 的组合策略是什么？（L3+ 考察）"

exam_points:
  - "Fine-tuning = 在预训练模型上继续训练，更新模型参数（永久性学习）"
  - "LoRA：只训练低秩适配矩阵，参数量 < 1%，生产微调首选"
  - "适用场景：格式一致性 / 特定风格 / 专业术语 / 小模型替代大模型"
  - "不适用：知识频繁更新（用RAG）/ 数据不足（< 200条）/ Prompt 能解决的问题"
  - "Fine-tuning vs RAG：改行为用微调，注入知识用RAG，最佳实践是结合使用"

one_liner: "Fine-tuning = 专项培训模型，让它记住特定格式/风格/知识——改变的是模型本身，不是每次对话的上下文。"
difficulty: expert
