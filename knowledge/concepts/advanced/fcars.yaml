interview_points:
  - "FCARS 是什么？为什么企业级 AI 平台需要 FCARS 框架？"
  - "Fairness 维度如何量化评估？Disparate Impact 是什么？"
  - "GDPR 对 AI 系统有哪些具体要求？被遗忘权如何在 RAG 系统中落地？"
  - "Accountability 维度要求记录哪些信息？"
  - "如何在架构层面系统性地落地 FCARS？（L4 考察）"

exam_points:
  - "FCARS = Fairness（公平）/ Compliance（合规）/ Accountability（问责）/ Reliability（可靠）/ Safety（安全）"
  - "Fairness 关键指标：Disparate Impact（< 0.8 为显著不公平）"
  - "Compliance 关键法规：GDPR（被遗忘权、知情同意）/ EU AI Act（高风险系统注册）"
  - "Accountability = 决策可追溯 + 责任归属 + 审计日志"
  - "L3+ 架构师必须能在平台层系统落地 FCARS，不只是了解概念"

one_liner: "FCARS = AI 系统的五维度治理框架，从公平合规到安全可靠，是 AI 平台架构师的必备设计语言。"
difficulty: expert
