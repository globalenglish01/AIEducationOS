interview_points:
  - "Tool Injection 和直接 Prompt Injection 有什么区别？为什么更难防御？"
  - "如何防止 Agent 在读取网页时被 Tool Injection 攻击？"
  - "外部数据隔离标记（<EXTERNAL_DATA>标签）的原理是什么？"
  - "Tool Injection 成功的前提条件是什么？（L3+ 考察）"

exam_points:
  - "Tool Injection = 恶意指令藏在外部数据中（网页/文档/DB），Agent 读取后当指令执行"
  - "比直接注入更难防：来自'可信'数据源，输入验证不起作用"
  - "防御核心：外部数据标记为<EXTERNAL_DATA>告知LLM是数据非指令 + 工具输出过滤"
  - "减小破坏半径：最小权限（不给不需要的工具）"

one_liner: "Tool Injection = 把恶意指令藏进网页/文档，让 Agent 读完后当命令执行——比直接注入更难防。"
difficulty: advanced
