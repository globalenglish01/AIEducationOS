interview_points:
  - "Agent Privilege Escalation（权限提升）有哪些常见场景？"
  - "如何用最小权限原则设计 Agent 的工具集？"
  - "如何防止 Agent 的文件读取工具被用来读取 .env 文件？（要求写代码）"
  - "代码执行工具的沙箱隔离应该如何实现？"
  - "Agent 的数据库访问应该使用什么权限级别？（L3+ 考察安全架构）"

exam_points:
  - "两类权限提升：设计时过度授权 / 运行时通过注入触发权限滥用"
  - "最小权限原则：Agent 只拥有当前任务所需的最小工具和权限"
  - "文件工具防御：路径白名单 + 路径规范化（防 path traversal）"
  - "代码执行防御：Docker 沙箱 + 禁止网络 + 资源限制"
  - "数据库防御：只读账户 + 只授权必要表"

one_liner: "Agent 权限提升 = Agent 能做的比它应该做的多——用最小权限原则和沙箱隔离把权限锁死。"
difficulty: advanced
