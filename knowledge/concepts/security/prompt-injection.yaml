  - "两类：直接注入（用户直接输入）/ 间接注入（外部数据中隐藏）"
  - "基本防御：System Prompt 和 User Input 严格分离，不拼接"
  - "间接注入防御：外部数据标记为不可信，提醒 LLM 忽略指令性文字"
  - "纵深防御：输入过滤 + 结构分离 + 输出验证 + 最小权限"

one_liner: "Prompt Injection = SQL 注入的 AI 版，攻击者在输入中藏指令来绕过 System Prompt 的安全约束。"
difficulty: advanced
