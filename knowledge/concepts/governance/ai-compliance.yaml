interview_points:
  - "GDPR 对 AI 系统有哪些特殊要求？（自动化决策、被遗忘权等）"
  - "如果用户行使'被遗忘权'，AI 系统需要删除哪些数据？（考察全面性）"
  - "什么是数据主权？为什么 AI 系统的数据存储位置很重要？"
  - "如何设计一个'Privacy by Design'的 AI 系统？（L4 考察设计理念）"

exam_points:
  - "GDPR 核心权利：访问权 / 更正权 / 删除权（被遗忘权）/ 携带权"
  - "删除权执行范围：对话历史 + 向量 Embedding + Long-term Memory + 日志中的 PII"
  - "审计日志必须：不可篡改 + 保留期符合要求（通常 5-7 年）"
  - "72小时通报义务：数据泄露后 72 小时内通知监管机构"

one_liner: "AI 合规 = 在系统设计阶段就把法律红线（GDPR/数据主权/被遗忘权/审计）做进去，而非上线后被罚款再补救。"
difficulty: expert
