interview_points:
  - "FCARS 五个维度分别是什么？各举一个工程实现的例子。"
  - "为什么 AI 系统需要 Accountability？和传统软件系统有什么不同？"
  - "如何验证一个 AI 系统在 Fairness 维度达标？需要什么数据？"
  - "如果用户行使 GDPR 的'被遗忘权'，AI 系统需要删除哪些数据？（L3+ 考察合规深度）"

exam_points:
  - "FCARS = Fairness / Compliance / Accountability / Reliability / Safety"
  - "Accountability 核心：决策链路可追溯 + Human-in-the-Loop 记录 + 模型版本记录"
  - "Compliance 核心：数据主权 + 知情同意 + 被遗忘权 + 审计日志"
  - "Safety 核心：输入过滤 + 输出过滤 + 最小权限 + 定期安全审计"

one_liner: "FCARS = AI 系统的适航证检查清单：公平、合规、问责、可靠、安全五维度全过关，才能放心上线。"
difficulty: expert
