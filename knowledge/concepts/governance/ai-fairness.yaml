interview_points:
  - "AI 偏见的四个主要来源是什么？各举一个例子。"
  - "Demographic Parity 和 Equal Opportunity 有什么区别？各适合什么场景？"
  - "如何检测 LLM 中是否存在性别/种族偏见？描述一个具体测试方法。"
  - "发现 AI 系统存在偏见后，应该采取哪些措施？（L4 考察系统性思维）"

exam_points:
  - "AI 偏见四来源：训练数据偏见 / 特征选择偏见 / 模型放大偏见 / 评估偏见"
  - "三个公平性指标：Demographic Parity / Equal Opportunity / Calibration"
  - "Equal Opportunity 优于 Demographic Parity：考虑了实际资质差异"
  - "去偏三层：数据层（重采样）/ Prompt 层（明确要求公平）/ 输出层（监控差异）"

one_liner: "AI 公平性 = 用数字证明不同群体被同等对待，定期运行偏见审计，而非靠'我们没有歧视的主观意图'来保证。"
difficulty: expert
