interview_points:
  - "为什么生产级 AI 系统必须设置 Token 预算？不设有什么风险？"
  - "Token 预算的四个层级分别控制什么？"
  - "Token 预算超限时应该怎么处理？直接报错是否合适？"
  - "如何根据业务场景设计合理的 Token 预算？（L3+ 考察成本意识）"

exam_points:
  - "Token Budget 四级：调用级 / 任务级 / 用户级 / 全局级"
  - "超限降级策略：80% 时压缩上下文 → 100% 时切小模型 → 大幅超出时拒绝"
  - "不能直接报错：要降级而非中断，保障系统可用性"
  - "记录实际 Token 用量：用于持续优化预算配置"

one_liner: "Token Budget = 给 AI 调用设报销额度，超限触发降级而非报错，把成本从'事后算账'变成'事前管理'。"
difficulty: intermediate
