  - "Pruning（删除）vs Compression（压缩）：前者删除无用，后者浓缩有用"

one_liner: "Context Pruning = 发给 LLM 之前先做'减法'，删掉 HTML 标签、低相关 RAG 块、无意义对话，让每个 token 都有用。"
difficulty: intermediate
