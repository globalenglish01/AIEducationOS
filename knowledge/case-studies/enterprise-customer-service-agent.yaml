interview_points:
  - "这个系统中 Human-in-the-Loop 有几个介入点？各自的触发条件是什么？"
  - "为什么 Triage Agent 要用大模型，而 FAQ Agent 可以用小模型？"
  - "如何设计 RAG 知识库以覆盖客服场景的不同文档类型？"
  - "如何评估这个 AI 客服系统是否达到了生产质量？（L3+ 考察评估能力）"

exam_points:
  - "架构：Triage（Supervisor）→ FAQ/Order/Escalation（Worker），各 Agent 最小权限"
  - "Human-in-the-Loop 三点：高金额退款 + 高情绪用户 + 低置信度（三选一都对）"
  - "FAQ Agent 用小模型（省成本）；Triage 用大模型（准确性最重要）"
  - "情绪检测升级优先于意图处理：愤怒用户直接给人工，不强行 AI 处理"

one_liner: "企业客服 Agent = Triage Supervisor 分诊 + 专业 Worker 执行 + 三个 Human-in-the-Loop 节点，70% 自动化，退款/高情绪/低置信度三种情况必须人工介入。"
difficulty: intermediate
