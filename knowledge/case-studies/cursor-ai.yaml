layer_1_rag: |
  ## 第一层：代码库 RAG（Codebase Indexing）

  Cursor 的核心差异化：理解整个代码库，而非单个文件。

  技术实现：
  1. 索引构建：扫描 Repo，对代码文件做 Chunking（按函数/类分块）
  2. 向量化：使用专为代码优化的 Embedding 模型
  3. 存储：本地向量数据库（SQLite + FAISS）
  4. 检索：用户问题 → 检索最相关代码片段 → 注入 Prompt

  关键设计决策：
  - 增量更新：文件变化时只重索引变动部分（全量索引太慢）
  - 本地存储：索引存在用户本地，保护代码隐私
  - 树状摘要（Tree-sitter）：理解代码的语法结构，而非纯文本

  工程挑战：
  - 大型 Repo（100k+ 文件）的索引速度：用 Rust 实现文件扫描
  - 增量索引的一致性：文件删除/重命名时保证索引同步
  - 检索质量：代码检索比文档检索更难（语义 + 结构双重要求）

layer_2_agent: |
  ## 第二层：Agent 编辑（Cursor Agent Mode）

  Cursor Agent 是一个具备跨文件理解和修改能力的编码 Agent：

  核心能力：
  - 读取任意文件：理解代码上下文
  - 修改多个文件：一次任务可能修改 10+ 个文件
  - 执行终端命令：安装依赖、运行测试、构建项目
  - 自动修复错误：看到 Terminal 错误后自动 debug

  执行流程（ReAct Pattern）：
  用户：「实现一个 JWT 认证中间件」
  →  Agent Thought: 需要先了解项目结构和现有中间件
  →  Action: read_file("src/middleware/")
  →  Observation: 发现有 auth.py 基础文件
  →  Action: read_file("src/auth.py") + read_file("requirements.txt")
  →  Thought: 项目用 FastAPI + python-jose，可以实现 JWT
  →  Action: edit_file("src/middleware/auth.py", new_content=...)
  →  Action: edit_file("src/main.py", add_middleware=...)
  →  Action: run_terminal("pip install python-jose cryptography")
  →  Final Answer: JWT 中间件已实现，添加到 main.py

  Human-in-the-Loop：
  - 所有文件修改前展示 Diff，用户确认后才执行
  - 高风险操作（删除文件）需要额外确认
  - 用户可以随时打断，修改方向后继续

layer_3_mcp: |
  ## 第三层：MCP 工具扩展

  Cursor 通过 MCP Protocol 接入外部工具，将 IDE 变为
  连接整个开发生态的中枢：

  常见 MCP 工具集成：
  - 数据库：查询数据库 Schema，直接在 IDE 里写 SQL
  - 文档：搜索 Confluence/Notion，获取 API 文档
  - GitHub：查看 PR 历史，理解代码变更背景
  - Sentry：查看生产错误，直接在 IDE 里 debug
  - Jira：获取需求详情，代码实现和需求自动关联

  MCP 的作用：
  每个 MCP Server 就是一个"工具模块"，
  Agent 可以按需调用，而不需要把所有功能内置进 Cursor 本身。
  这是 Cursor 生态可扩展性的关键。

cost_optimization: |
  ## 成本优化策略

  Cursor 每月订阅费 $20，但 LLM 调用成本如何控制？

  1. 上下文精准裁剪：
     - 不把整个代码库塞进 Prompt
     - RAG 只取最相关的 3-5 个代码片段
     - 用 Tree-sitter 提取函数签名而非完整函数体

  2. 模型分级（Model Routing）：
     - 简单补全（Tab 补全）：使用小模型（速度优先）
     - Agent 编辑：使用 GPT-4o 或 Claude 3.5（质量优先）
     - 用户可切换模型：高级用户选 Claude Opus

  3. 本地缓存：
     - 代码索引本地缓存，减少重复 Embedding 调用
     - 近期对话上下文内存缓存（Semantic Cache）

security_design: |
  ## 安全设计

  代码是公司最敏感的资产，Cursor 的安全设计：

  1. Privacy Mode：
     - 代码不上传到 Cursor 服务器
     - LLM 调用直接发给 OpenAI/Anthropic，Cursor 不做中转
     - 索引存本地，不同步云端

  2. API Key 管理：
     - 企业版支持自带 API Key（BYOK）
     - Key 加密存储在本地，不传 Cursor 服务器

  3. MCP 沙箱：
     - MCP 工具在受限权限下运行
     - 用户必须主动安装和授权 MCP Server

lessons_learned:
  - lesson: "RAG 质量比 LLM 质量更重要"
    detail: "早期 Cursor 用 GPT-3.5 + 精准 RAG，效果优于 GPT-4 + 粗糙上下文"

  - lesson: "Human-in-the-Loop 是信任的基础"
    detail: "Agent 自动修改代码必须展示 Diff 等待确认，没有这个环节用户不敢用 Agent Mode"

  - lesson: "本地索引 = 差异化护城河"
    detail: "竞品需要上传代码才能理解上下文，Cursor 本地索引保护隐私，这是 Enterprise 采购的关键因素"

  - lesson: "MCP 生态 > 自建功能"
    detail: "与其把所有工具内置进 IDE，不如开放 MCP 协议让社区构建，Cursor 的 MCP 生态现已有 1000+ Server"

