summary: "Cursor 是最成功的 AI Native 开发工具，融合 RAG（代码库索引）、Agent（自主编辑）、MCP（工具扩展）三层架构，2024 年 ARR 超 2 亿美元。"

overview: |
  Cursor 是由 Anysphere 开发的 AI 原生 IDE，基于 VS Code 构建。
  它不是"在 IDE 里加一个聊天框"，而是从底层重新设计了
  人机协作的编程工作流：
  - 代码库理解：对整个 Repo 建立语义索引（RAG）
  - 自主编辑：Agent 可以跨文件理解和修改代码
  - 工具扩展：通过 MCP 协议接入外部工具（数据库、Docs、API）

why_it_matters: |
  Cursor 是"AI Native Engineering"从理论到产品的最佳案例：
  - 证明了 RAG + Agent + MCP 三层架构的商业可行性
  - 验证了"AI 工具应该理解整个上下文，而非单文件"
  - 展示了如何在生产 AI 产品中平衡能力、速度、成本

architecture: |
  ┌─────────────────────────────────────────────────────┐
  │                    Cursor IDE                        │
  │                                                     │
  │  ┌──────────────┐  ┌──────────────┐  ┌──────────┐  │
  │  │  代码库索引   │  │  Agent 编辑  │  │  MCP 工  │  │
  │  │  (RAG 层)    │  │  (Agent 层)  │  │  具扩展  │  │
