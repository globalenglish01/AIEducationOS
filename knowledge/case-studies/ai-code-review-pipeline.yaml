interview_points:
  - "为什么四个 Agent 要并行执行而不是串行？并行带来什么工程挑战？"
  - "安全 Agent 为什么不能用小模型？误报和漏报哪个更危险？"
  - "规范 Agent 依赖 RAG 知识库——如果团队规范更新了，怎么保证系统同步？"
  - "如何评估这个 AI Review 系统的质量？用什么指标？（L3+ 考察评估能力）"

exam_points:
  - "并行执行四个 Agent：30 秒 vs 串行 90+ 秒，Pipeline 设计关键"
  - "CRITICAL 问题自动阻塞 PR：不只是建议，才能让 AI 成为真正的门禁"
  - "安全 Agent 用大模型：漏报一个安全漏洞进生产的代价 >> 多花的 LLM 费用"
  - "黄金数据集 100 个 PR：A/B 测试 Prompt 改动，防止性能退化"

one_liner: "AI 代码审查 = 四个专业 Agent 并行审查（安全/质量/规范/测试）→ Report Agent 综合 → CRITICAL 自动阻塞 PR，Prompt 每次改动都要跑黄金数据集验证。"
difficulty: advanced
