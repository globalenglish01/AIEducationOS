  - "Token 配额管理为什么用 Redis 而不用数据库？"
  - "GDPR 数据删除权如何在 AI 系统中实现？审计日志为什么不能删除？"
  - "数据驻留（Data Residency）要求如何影响 AI 系统的架构设计？（L3+ 考察）"

exam_points:
  - "四层隔离：应用层 WHERE tenant_id + DB RLS + 向量 DB Namespace + S3 路径"
  - "配额计数：Redis INCR（高频原子操作），异步写入账单数据库"
  - "GDPR 删除：业务数据删除，审计日志保留删除事件（不保留内容）"
  - "数据驻留：根据 tenant.data_residency 路由到对应区域的 LLM 服务"

one_liner: "多租户 AI SaaS = 四层数据隔离（应用层+RLS+向量Namespace+S3路径）+ Redis 配额计数 + Append-Only 审计日志，GDPR 要求业务数据可删但审计记录不可删。"
difficulty: advanced
